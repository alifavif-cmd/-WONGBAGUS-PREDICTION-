<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rumus Harian Lengkap 2026 — WONGBAGUS PREDICTION</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#f59e0b;--gold-light:#fcd34d;--gold-dark:#b45309;--bg:#07070e;--bg2:#0f0f1a;--bg3:#15152a;--card:#111128;--border:rgba(245,158,11,0.15);--text:#e2e2f0;--muted:#6b6b8a;--green:#10b981;--red:#dc2626;--blue:#3b82f6;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;bottom:-200px;left:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(59,130,246,.04) 0%,transparent 70%);pointer-events:none;}

.topbar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(7,7,14,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:99;}
.topbar-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--red));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:16px;color:#000;text-decoration:none;flex-shrink:0;}
.topbar-info{flex:1;}
.topbar-title{font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;background:linear-gradient(90deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.topbar-sub{font-size:10px;color:var(--muted);font-weight:600;}
.topbar-back{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-family:'Nunito';font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s;flex-shrink:0;}
.topbar-back:hover{border-color:var(--gold);color:var(--gold);}

.container{max-width:640px;margin:0 auto;padding:16px;position:relative;z-index:1;}
.page-hero{text-align:center;padding:20px 0 6px;}
.page-hero-icon{font-size:36px;margin-bottom:8px;}
.page-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;color:var(--blue);line-height:1;}
.page-sub{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.6;}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.card-title::before{content:'';display:block;width:3px;height:14px;background:var(--blue);border-radius:2px;}

label{font-size:11px;color:var(--muted);font-weight:800;display:block;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
select,input{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Nunito';font-size:14px;font-weight:600;width:100%;outline:none;margin-bottom:12px;transition:border-color .2s;}
select:focus,input:focus{border-color:var(--blue);}

.label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.label-row label{margin-bottom:0;}
.result-hint{font-size:11px;color:var(--green);font-weight:700;min-height:18px;margin:-8px 0 10px;}

.btn-autofill{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:var(--green);border-radius:8px;padding:5px 12px;font-family:'Nunito';font-size:12px;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap;}
.btn-autofill:hover{background:rgba(16,185,129,.25);}
.btn-autofill:disabled{opacity:.4;cursor:not-allowed;}

.result-input-big{font-size:28px!important;font-weight:900!important;letter-spacing:8px!important;text-align:center!important;font-family:'Bebas Neue',sans-serif!important;color:var(--gold)!important;height:60px!important;}

.btn{padding:12px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Nunito';font-size:14px;font-weight:800;transition:.2s;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-blue{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;box-shadow:0 4px 16px rgba(37,99,235,.25);}
.btn-blue:hover{opacity:.9;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}

/* RESULT DISPLAY */
.result-display{background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(29,78,216,.06));border:1px solid rgba(59,130,246,.25);border-radius:14px;padding:16px;text-align:center;margin-bottom:14px;}
.result-display-lbl{font-size:10px;font-weight:800;color:#93c5fd;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
.result-display-num{font-family:'Bebas Neue';font-size:52px;letter-spacing:8px;color:#fff;line-height:1;}
.result-pos-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;}
.result-pos-box{background:rgba(255,255,255,.06);border-radius:8px;padding:8px;text-align:center;}
.result-pos-lbl{font-size:9px;color:var(--muted);font-weight:800;letter-spacing:.5px;}
.result-pos-num{font-family:'Bebas Neue';font-size:22px;color:var(--gold);}

/* RUMUS GRID */
.rumus-grid{display:flex;flex-direction:column;gap:8px;}
.rumus-item{background:var(--bg3);border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;transition:background .15s;}
.rumus-item:hover{background:rgba(245,158,11,.05);}
.rumus-item-left{flex:1;}
.rumus-item-nama{font-size:12px;color:var(--text);font-weight:600;}
.rumus-item-desc{font-size:10px;color:var(--muted);margin-top:2px;}
.rumus-item-val{font-family:'Bebas Neue';font-size:26px;letter-spacing:4px;color:var(--gold);flex-shrink:0;min-width:48px;text-align:right;}

/* SUMMARY ROW */
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.summary-box{background:var(--bg3);border-radius:10px;padding:10px;text-align:center;}
.summary-lbl{font-size:9px;color:var(--muted);font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;}
.summary-val{font-family:'Bebas Neue';font-size:22px;color:var(--gold);}

.divider{height:1px;background:var(--border);margin:12px 0;}
.category-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:20px;font-size:10px;font-weight:800;margin-bottom:10px;}
.cat-basic{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3);color:#60a5fa;}
.cat-silang{background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);color:#a78bfa;}
.cat-balik{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:var(--gold);}
.cat-turunan{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#34d399;}

footer{text-align:center;padding:24px 16px;border-top:1px solid var(--border);margin-top:20px;color:var(--muted);font-size:11px;}
footer a{color:var(--gold);text-decoration:none;}
</style>
<script src="./wb_data.js" onerror="var s=document.createElement('script');s.src='https://alifavif-cmd.github.io/-WONGBAGUS-PREDICTION-/wb_data.js';document.head.appendChild(s);"></script>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-logo">WB</a>
  <div class="topbar-info">
    <div class="topbar-title">WONGBAGUS PREDICTION</div>
    <div class="topbar-sub">RUMUS HARIAN LENGKAP 2026</div>
  </div>
  <a href="index.html" class="topbar-back">← Beranda</a>
</div>

<div class="container">
  <div class="page-hero">
    <div class="page-hero-icon">📋</div>
    <div class="page-title">Rumus Harian</div>
    <p class="page-sub">Kumpulan rumus lengkap & jitu · Hitung dari result terakhir</p>
  </div>

  <div class="card">
    <div class="card-title">Input Result Terakhir</div>

    <label>Pilih Pasaran <span id="dataStatus" style="text-transform:none;font-size:10px;color:var(--muted);font-weight:600;"></span></label>
    <select id="pasaran" onchange="onPasaranChange()">
      <option value="">⏳ Memuat 65 pasaran...</option>
    </select>
    <div class="result-hint" id="resultHint"></div>

    <div class="label-row">
      <label>Result 4 Digit</label>
      <button class="btn-autofill" id="btnAutoFill" onclick="autoFillResult()" disabled>📡 Ambil Terkini</button>
    </div>
    <input type="text" id="res4d" class="result-input-big" placeholder="4821" maxlength="4" oninput="this.value=this.value.replace(/[^0-9]/g,'')">

    <button class="btn btn-blue" onclick="hitungRumus()">⚡ Hitung Semua Rumus</button>
  </div>

  <div id="hasilRumus"></div>
</div>

<footer>
  <strong>WONGBAGUS PREDICTION</strong> · Rumus Harian Lengkap 2026<br>
  <a href="index.html">← Kembali ke Beranda</a>
</footer>

<script>
function hitungRumus(){
  const s=document.getElementById('res4d').value.trim();
  if(s.length!==4||isNaN(s)){alert('Masukkan 4 digit angka!');return;}
  const [a,b,c,d]=[...s].map(Number);
  const as=a,kop=b,kep=c,ek=d;
  const jum=a+b+c+d;
  const jum2=(a+b)%10*10+(c+d)%10;

  const rumus=[
    // BASIC
    {kat:'basic',nama:'Kepala + Ekor',desc:'KEP + EK mod 10 · AS + KOP mod 10',hasil:`${(kep+ek)%10}${(as+kop)%10}`},
    {kat:'basic',nama:'Jumlah 4 Digit',desc:'AS+KOP+KEP+EK = jumlah total',hasil:`${jum%100}`.padStart(2,'0')},
    {kat:'basic',nama:'AS + EK',desc:'Angka pertama + angka terakhir',hasil:`${(as+ek)%100}`.padStart(2,'0')},
    {kat:'basic',nama:'KOP + KEP',desc:'Angka kedua + angka ketiga',hasil:`${(kop+kep)%100}`.padStart(2,'0')},
    {kat:'basic',nama:'AS × EK mod 100',desc:'Perkalian AS dan EK',hasil:`${(as*ek)%100}`.padStart(2,'0')},
    // BALIK
    {kat:'balik',nama:'Balik EK-KEP',desc:'Posisi ekor-kepala dibalik',hasil:`${ek}${kep}`},
    {kat:'balik',nama:'Balik AS-KOP',desc:'Posisi AS-KOP dibalik',hasil:`${kop}${as}`},
    {kat:'balik',nama:'Balik Penuh',desc:'4 digit dibalik semua',hasil:`${d}${c}${b}${a}`.slice(-2)},
    {kat:'balik',nama:'Balik Tengah',desc:'Digit tengah dibalik',hasil:`${kep}${kop}`},
    // SILANG
    {kat:'silang',nama:'Silang AS×KEP',desc:'(AS+KEP) mod 10 · (KOP+EK) mod 10',hasil:`${(as+kep)%10}${(kop+ek)%10}`},
    {kat:'silang',nama:'Silang KOP×EK',desc:'(KOP+EK) mod 10 · (AS+KEP) mod 10',hasil:`${(kop+ek)%10}${(as+kep)%10}`},
    {kat:'silang',nama:'Diagonal Kanan',desc:'AS+EK mod 10 · KOP+KEP mod 10',hasil:`${(as+ek)%10}${(kop+kep)%10}`},
    // TURUNAN
    {kat:'turunan',nama:'Kepala Turunan +1',desc:'KEP+1 · EK+1 mod 10',hasil:`${(kep+1)%10}${(ek+1)%10}`},
    {kat:'turunan',nama:'Ekor Naik +2',desc:'AS+2 · KOP+2 mod 10',hasil:`${(as+2)%10}${(kop+2)%10}`},
    {kat:'turunan',nama:'Tengah Rata',desc:'(KOP+KEP)/2 kombinasi',hasil:`${Math.floor((kop+kep)/2)}${(kop+kep)%10}`},
    {kat:'turunan',nama:'Rumus Mistik',desc:'(AS×KOP+EK) mod 100',hasil:`${(as*kop+ek)%100}`.padStart(2,'0')},
    {kat:'turunan',nama:'Kombinasi Jum',desc:'Jumlah ÷ 2 & sisa',hasil:`${Math.floor(jum/2)%10}${jum%2===0?jum/2%10:(jum+1)/2%10}`},
    {kat:'turunan',nama:'Rumus Ekor Kepala',desc:'EK langsung · KEP langsung',hasil:`${ek}${kep}`},
  ];

  const katLabel={basic:'Rumus Dasar',silang:'Rumus Silang',balik:'Rumus Balik',turunan:'Rumus Turunan'};
  const katIcon={basic:'📊',silang:'✖️',balik:'🔄',turunan:'📈'};
  const katClass={basic:'cat-basic',silang:'cat-silang',balik:'cat-balik',turunan:'cat-turunan'};

  let grouped={basic:[],silang:[],balik:[],turunan:[]};
  rumus.forEach(r=>grouped[r.kat].push(r));

  let rumusHTML='';
  ['basic','silang','balik','turunan'].forEach(kat=>{
    rumusHTML+=`<div style="margin-bottom:14px;">
      <span class="category-badge ${katClass[kat]}">${katIcon[kat]} ${katLabel[kat]}</span>
      <div class="rumus-grid">${grouped[kat].map(r=>`
        <div class="rumus-item">
          <div class="rumus-item-left">
            <div class="rumus-item-nama">${r.nama}</div>
            <div class="rumus-item-desc">${r.desc}</div>
          </div>
          <div class="rumus-item-val">${r.hasil}</div>
        </div>`).join('')}
      </div>
    </div>`;
  });

  const hasilArr=rumus.map(r=>r.hasil);
  const freq={};hasilArr.forEach(h=>{freq[h]=(freq[h]||0)+1;});
  const topResult=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>k);

  document.getElementById('hasilRumus').innerHTML=`
  <div class="card">
    <div class="result-display">
      <div class="result-display-lbl">Result Input</div>
      <div class="result-display-num">${s}</div>
      <div class="result-pos-row">
        <div class="result-pos-box"><div class="result-pos-lbl">AS</div><div class="result-pos-num">${as}</div></div>
        <div class="result-pos-box"><div class="result-pos-lbl">KOP</div><div class="result-pos-num">${kop}</div></div>
        <div class="result-pos-box"><div class="result-pos-lbl">KEP</div><div class="result-pos-num">${kep}</div></div>
        <div class="result-pos-box"><div class="result-pos-lbl">EK</div><div class="result-pos-num">${ek}</div></div>
      </div>
    </div>

    <div class="summary-row">
      <div class="summary-box"><div class="summary-lbl">Total 4D</div><div class="summary-val">${jum}</div></div>
      <div class="summary-box"><div class="summary-lbl">Jumlah 2D</div><div class="summary-val">${jum%100}</div></div>
      <div class="summary-box"><div class="summary-lbl">Sering Muncul</div><div class="summary-val">${topResult[0]||'--'}</div></div>
    </div>

    <div class="divider"></div>
    <div style="font-size:10px;color:var(--muted);font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;">Angka Sering (${rumus.length} Rumus)</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
      ${topResult.map((n,i)=>`<div style="display:flex;align-items:center;gap:6px;background:var(--bg3);border-radius:8px;padding:6px 12px;">
        <span style="font-size:10px;color:var(--muted);font-weight:800;">#${i+1}</span>
        <span style="font-family:'Bebas Neue';font-size:22px;color:var(--gold);">${n}</span>
        <span style="font-size:10px;color:var(--muted);">${freq[n]}×</span>
      </div>`).join('')}
    </div>

    <div class="divider"></div>
    ${rumusHTML}

    <div class="divider"></div>
    <button class="btn btn-outline" onclick="copyRumus()" style="font-size:12px;">📋 Copy Semua Rumus</button>
  </div>`;
  window._rumusData={s,rumus,topResult};
}

function copyRumus(){
  const d=window._rumusData;if(!d)return;
  const txt=[
    '📋 WONGBAGUS PREDICTION — Rumus Harian',
    `Result: ${d.s}`,
    '━━━━━━━━━━━━━━━━━━━━━━━',
    ...d.rumus.map(r=>`${r.nama}: ${r.hasil}`),
    '━━━━━━━━━━━━━━━━━━━━━━━',
    `🎯 Sering Muncul: ${d.topResult.join(' · ')}`,
    '━━━━━━━━━━━━━━━━━━━━━━━',
    '🌐 WONGBAGUS PREDICTION'
  ].join('\n');
  navigator.clipboard.writeText(txt).then(()=>alert('✅ Tersalin!')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('✅ Tersalin!');
  });
}

// WBData
let _wbDataReady=false;
function buildPasaranDropdown(){
  const sel=document.getElementById('pasaran');sel.innerHTML='';
  (WBData.MARKETS||[]).forEach(m=>{const o=document.createElement('option');o.value=m.id;o.textContent=`${m.flag} ${m.name} (${m.short})`;sel.appendChild(o);});
  sel.value='hk';_wbDataReady=true;document.getElementById('btnAutoFill').disabled=false;onPasaranChange();
}
function onPasaranChange(){
  const id=document.getElementById('pasaran').value;const hint=document.getElementById('resultHint');
  if(!id||!_wbDataReady){hint.textContent='';return;}
  const r=WBData.getResult(id);const entry=WBData.get(id);
  if(r&&r!=='----'){const tgl=entry&&entry.tgl?' · '+entry.tgl:'';hint.textContent=`📡 Result terkini: ${r}${tgl}`;}
  else{hint.textContent='⏳ Result belum tersedia';}
}
function autoFillResult(){
  const id=document.getElementById('pasaran').value;if(!id)return;
  const r=WBData.getResult(id);
  if(r&&r!=='----'){document.getElementById('res4d').value=r;onPasaranChange();}
  else{alert('⚠️ Result belum tersedia.');}
}
async function initWBData(){
  const st=document.getElementById('dataStatus');
  if(WBData.MARKETS&&WBData.MARKETS.length)buildPasaranDropdown();
  if(!WBData.isFresh()){st.textContent='⏳';await WBData.refresh();st.textContent='';}
  else{st.textContent='✅';setTimeout(()=>{st.textContent='';},2000);}
  if(!_wbDataReady)buildPasaranDropdown();
  onPasaranChange();WBData.onUpdate(()=>onPasaranChange());
}
initWBData();
</script>
</body></html>
