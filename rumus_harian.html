<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rumus Harian — WONGBAGUS PREDICTION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#f59e0b;--gold-light:#fcd34d;--bg:#07070e;--bg2:#0f0f1a;--bg3:#15152a;--card:#111128;--border:rgba(245,158,11,0.15);--text:#e2e2f0;--muted:#6b6b8a;--green:#10b981;--red:#dc2626;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:99;}
.topbar-logo{width:36px;height:36px;background:linear-gradient(135deg,#f59e0b,#b45309);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:18px;color:#000;text-decoration:none;}
.topbar-title{font-family:'Bebas Neue';font-size:18px;letter-spacing:1px;background:linear-gradient(90deg,#fcd34d,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-back{margin-left:auto;padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Nunito';font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;}
.topbar-back:hover{color:var(--gold);border-color:var(--gold);}
.container{max-width:600px;margin:0 auto;padding:16px;}
.page-title{font-family:'Bebas Neue';font-size:26px;letter-spacing:2px;color:var(--gold);margin:16px 0 4px;}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
.input-group{display:flex;gap:8px;margin-bottom:12px;}
input,select{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Nunito';font-size:14px;width:100%;outline:none;}
input:focus,select:focus{border-color:var(--gold);}
.btn{padding:11px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Nunito';font-size:14px;font-weight:800;transition:.2s;}
.btn-gold{background:linear-gradient(135deg,#f59e0b,#b45309);color:#000;}
.btn-gold:hover{opacity:.9;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.result-box{background:var(--bg3);border-radius:12px;padding:14px;margin-top:10px;min-height:60px;font-size:13px;line-height:1.8;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-gold{background:rgba(245,158,11,.15);color:var(--gold);border:1px solid rgba(245,158,11,.3);}
.badge-green{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3);}
.badge-red{background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.3);}
.num-grid{display:flex;flex-wrap:wrap;gap:6px;}
.num-box{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;cursor:pointer;border:2px solid transparent;transition:.15s;}
.num-box.selected{border-color:var(--gold);background:rgba(245,158,11,.2);color:var(--gold);}
.num-box.default{background:var(--bg3);color:var(--text);}
.num-box.default:hover{border-color:var(--gold);}
.divider{height:1px;background:var(--border);margin:14px 0;}
footer{text-align:center;padding:24px 16px;border-top:1px solid var(--border);margin-top:24px;color:var(--muted);font-size:11px;}
.result-hint{font-size:11px;color:var(--green);font-weight:700;margin-top:4px;min-height:16px;}
.btn-autofill{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:var(--green);
  border-radius:8px;padding:7px 14px;font-family:'Nunito';font-size:13px;font-weight:700;
  cursor:pointer;transition:.2s;width:100%;margin-bottom:10px;}
.btn-autofill:hover{background:rgba(16,185,129,.3);}
.btn-autofill:disabled{opacity:.4;cursor:not-allowed;}
</style>
<script src="./wb_data.js"></script>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="topbar-logo">WB</a>
  <span class="topbar-title">WONGBAGUS PREDICTION</span>
  <a href="index.html" class="topbar-back">← Kembali</a>
</div>
<div class="container">
<div class="page-title">📋 Rumus Harian</div>
<p class="page-sub">Hitung angka harian dari result terakhir</p>
<div class="card">
  <div class="card-title">Input Result Terakhir</div>
  <label style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;">
    Pilih Pasaran <span id="dataStatus" style="font-size:10px;color:var(--muted);font-weight:600;text-transform:none;"></span>
  </label>
  <select id="pasaran" onchange="onPasaranChange()" style="margin-bottom:6px;">
    <option value="">⏳ Memuat 65 pasaran...</option>
  </select>
  <div class="result-hint" id="resultHint"></div>
  <button class="btn-autofill" id="btnAutoFill" onclick="autoFillResult()" disabled>📡 Ambil Result Terkini</button>
  <input type="text" id="res4d" placeholder="4 digit result (contoh: 4821)" maxlength="4" style="font-size:24px;font-weight:900;letter-spacing:6px;text-align:center;margin-bottom:12px;">
  <button class="btn btn-gold" style="width:100%" onclick="hitungRumus()">⚡ Hitung Semua Rumus</button>
</div>
<div id="hasilRumus"></div>
<script>
function hitungRumus(){
  const s=document.getElementById('res4d').value.trim();
  if(s.length!==4||isNaN(s)){alert('Masukkan 4 digit angka!');return;}
  const [a,b,c,d]=[...s].map(Number);
  const jum=a+b+c+d;
  const as=a,kop=b,kep=c,ek=d;
  const rumus=[
    {nama:'Kepala + Ekor',hasil:`${(kep+ek)%10}${(a+b)%10}`},
    {nama:'AS × EK mod 10',hasil:`${(as*ek)%100}`.padStart(2,'0')},
    {nama:'Jumlah 4D',hasil:`${jum%100}`.padStart(2,'0')},
    {nama:'AS + EK',hasil:`${(as+ek)%100}`.padStart(2,'0')},
    {nama:'KOP + KEP',hasil:`${(kop+kep)%100}`.padStart(2,'0')},
    {nama:'Balik EK-KEP',hasil:`${ek}${kep}`},
    {nama:'Balik AS-KOP',hasil:`${kop}${as}`},
    {nama:'Kepala Turunan',hasil:`${(kep+1)%10}${(ek+1)%10}`},
    {nama:'Ekor Naik',hasil:`${(as+2)%10}${(b+2)%10}`},
    {nama:'Rumus Ekor Kepala',hasil:`${ek}${kep}`},
    {nama:'Tengah (KOP+KEP)/2',hasil:`${Math.floor((kop+kep)/2)}${(kop+kep)%10}`},
    {nama:'Silang AS×KEP',hasil:`${(as+kep)%10}${(kop+ek)%10}`},
  ];
  document.getElementById('hasilRumus').innerHTML=`<div class="card">
    <div class="card-title">Hasil Rumus dari ${s}</div>
    <div style="display:grid;gap:8px;">
    ${rumus.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg3);border-radius:10px;">
      <span style="font-size:13px;color:var(--muted)">${r.nama}</span>
      <span style="font-family:'Bebas Neue';font-size:22px;letter-spacing:3px;color:var(--gold)">${r.hasil}</span>
    </div>`).join('')}
    </div>
    <div class="divider"></div>
    <button class="btn btn-outline" style="width:100%;font-size:12px" onclick="copyRumus()">📋 Copy Semua</button>
  </div>`;
  window._rumusData={s,rumus};
}
function copyRumus(){
  const d=window._rumusData;
  if(!d) return;
  const txt='📋 RUMUS HARIAN — WONGBAGUS PREDICTION
Result: '+d.s+'

'+d.rumus.map(r=>r.nama+': '+r.hasil).join('
')+'

https://alifavif-cmd.github.io/-WONGBAGUS-PREDICTION-/';
  navigator.clipboard.writeText(txt).then(()=>alert('✅ Tersalin!')).catch(()=>{});
}

// ── WBData: build dropdown 65 pasaran + auto-fill result ─────
let _wbDataReady = false;
function buildPasaranDropdown(){
  const sel=document.getElementById('pasaran');
  sel.innerHTML='';
  (WBData.MARKETS||[]).forEach(m=>{
    const opt=document.createElement('option');
    opt.value=m.id; opt.textContent=`${m.flag} ${m.name} (${m.short})`;
    sel.appendChild(opt);
  });
  sel.value='hk'; _wbDataReady=true;
  document.getElementById('btnAutoFill').disabled=false;
  onPasaranChange();
}
function onPasaranChange(){
  const id=document.getElementById('pasaran').value;
  const hint=document.getElementById('resultHint');
  if(!id||!_wbDataReady){hint.textContent='';return;}
  const r=WBData.getResult(id); const entry=WBData.get(id);
  if(r&&r!=='----'){
    const tgl=entry&&entry.tgl?' · '+entry.tgl:'';
    hint.textContent=`📡 Result terkini: ${r}${tgl}`;
  } else { hint.textContent='⏳ Result belum tersedia'; }
}
function autoFillResult(){
  const id=document.getElementById('pasaran').value; if(!id) return;
  const r=WBData.getResult(id);
  if(r&&r!=='----'){ document.getElementById('res4d').value=r; onPasaranChange(); }
  else { alert('⚠️ Result belum tersedia untuk pasaran ini.'); }
}
async function initWBData(){
  const statusEl=document.getElementById('dataStatus');
  if(WBData.MARKETS&&WBData.MARKETS.length) buildPasaranDropdown();
  if(!WBData.isFresh()){ statusEl.textContent='⏳ Memuat...'; await WBData.refresh(); statusEl.textContent=''; }
  else { statusEl.textContent='✅ Data tersedia'; setTimeout(()=>{statusEl.textContent='';},2000); }
  if(!_wbDataReady) buildPasaranDropdown();
  onPasaranChange();
  WBData.onUpdate(()=>onPasaranChange());
}
initWBData();

</script>
</div>
<footer><strong>WONGBAGUS PREDICTION</strong><br>
<a href="index.html" style="color:var(--gold);text-decoration:none;font-size:11px;">← Kembali ke Beranda</a>
</footer>
</body></html>
