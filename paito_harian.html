<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAITO HARIAN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&display=swap');

:root {
  --bg:#0a0c10; --surf:#111318; --border:#1e2230;
  --accent:#00e5ff; --accent2:#ff6b00;
  --text:#c8d0e0; --dim:#4a5068;
  --d0:#e53935; --d1:#e53935;
  --d2:#1e88e5; --d3:#1e88e5;
  --d4:#43a047; --d5:#43a047;
  --d6:#424242; --d7:#424242;
  --d8:#c0ca33; --d9:#ff6d00;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh}

header{
  position:sticky;top:0;z-index:100;
  height:50px;background:#0d0f14ee;
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 12px;
}
header h1{
  font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;
  color:var(--accent);letter-spacing:3px;flex:1;
}
#status{font-size:10px;color:var(--dim);letter-spacing:1px}
#status.ok{color:#43a047}
#status.err{color:#e53935}
#status.load{color:var(--accent)}
#btn-ref{
  background:none;border:1px solid var(--dim);color:var(--dim);
  font-family:inherit;font-size:10px;padding:3px 9px;cursor:pointer;
  letter-spacing:1px;border-radius:3px;transition:all .2s;
}
#btn-ref:hover{border-color:var(--accent);color:var(--accent)}
#btn-ref:disabled{opacity:.4;cursor:not-allowed}

#search-wrap{padding:8px 12px 0}
#search{
  width:100%;background:var(--surf);border:1px solid var(--border);
  color:var(--text);font-family:inherit;font-size:12px;
  padding:7px 12px;border-radius:4px;outline:none;letter-spacing:1px;
}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--dim)}

#last-updated{
  padding:4px 12px;font-size:10px;color:var(--dim);letter-spacing:1px;
}

#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:8px;padding:8px 12px 60px;
}

.card{
  background:var(--surf);border:1px solid var(--border);
  border-radius:6px;overflow:hidden;
  animation:fi .25s ease both;
}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card.hidden{display:none}

.card-head{
  display:flex;align-items:center;gap:6px;
  padding:6px 10px;border-bottom:1px solid var(--border);
  background:#13161e;
}
.card-name{
  font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;
  color:#fff;letter-spacing:.5px;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-code{
  font-size:9px;color:var(--accent2);letter-spacing:2px;
  background:#1e1608;padding:1px 5px;border-radius:2px;
  border:1px solid #3a2a0a;flex-shrink:0;
}
.card-today{
  font-size:10px;font-weight:700;letter-spacing:1px;
  color:#fff;flex-shrink:0;
}

.paito-row{
  display:grid;grid-template-columns:72px 1fr;
  border-bottom:1px solid #161820;
}
.paito-row:last-child{border-bottom:none}
.paito-row:hover{background:#13161e}
.paito-row.latest{background:#0c1518}

.row-date{
  padding:4px 8px;font-size:9px;color:var(--dim);
  display:flex;align-items:center;border-right:1px solid #161820;
}
.paito-row.latest .row-date{color:var(--accent)}

.row-digits{
  display:flex;align-items:center;padding:3px 6px;gap:2px;
}
.d{
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;
  font-family:'Oswald',sans-serif;flex-shrink:0;
}
.d0,.d1{background:var(--d0)}
.d2,.d3{background:var(--d2)}
.d4,.d5{background:var(--d4)}
.d6,.d7{background:var(--d6);border:1px solid #555}
.d8{background:var(--d8);color:#111}
.d9{background:var(--d9)}

.no-data{padding:10px;font-size:10px;color:var(--dim);text-align:center}

#msg{
  grid-column:1/-1;text-align:center;
  padding:60px 20px;font-size:13px;letter-spacing:2px;
}
#msg.load{color:var(--dim);animation:pulse 1.4s ease infinite}
#msg.err{color:#e53935}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

footer{
  position:fixed;bottom:0;left:0;right:0;height:28px;
  background:#0d0f14ee;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--dim);letter-spacing:2px;
}
#count{color:var(--accent);margin:0 4px}
</style>
</head>
<body>

<header>
  <h1>⬡ PAITO HARIAN</h1>
  <span id="status" class="load">LOADING</span>
  <button id="btn-ref" disabled>↺</button>
</header>

<div id="search-wrap">
  <input id="search" type="text" placeholder="cari pasaran... hk sgp sdy mac..." autocomplete="off">
</div>
<div id="last-updated"></div>

<div id="grid">
  <div id="msg" class="load">⬡ MENGAMBIL DATA ⬡</div>
</div>

<footer>DATA: result.json &nbsp;|&nbsp; PASARAN: <span id="count">-</span></footer>

<script>
// ══════════════════════════════════════
// CONFIG — sesuaikan jika pindah repo
// ══════════════════════════════════════
const RESULT_JSON = 'https://alifavif-cmd.github.io/-WONGBAGUS-PREDICTION-/result.json';
const CACHE_KEY   = 'ph_cache_v2';
const CACHE_TTL   = 20 * 60 * 1000; // 20 menit

// ── Urutan tampilan pasaran ──
const ORDER = [
  'hk','hkl','sgp','sdy','sdl','kam','bull','chn','jpn','twn','pcso',
  'mac1','mac2','mac3','mac4','mac5','mac6',
  'mrq3','mrq18','mrq21','mrq23','ger',
  'or4','or7','or10','or13',
  'ncd','nce','geom','geoe','geon',
  'txmr','txd','txe','txn',
  'nyd','nye','njm','nje','flm','fle',
  'ilm','ile','indm','inde','kym','kye',
  'mdm','mde','mim','mie',
];

// ── digit → warna class ──
function dSpan(ch) {
  return `<span class="d d${ch}">${ch}</span>`;
}

function fmtDate(s) {
  if (!s) return '';
  const p = s.split('-');
  return p.length === 3 ? `${p[2]}/${p[1]}` : s;
}

// ── Render satu card pasaran ──
function makeCard(key, data, idx) {
  const name    = data.name || key.toUpperCase();
  const code    = key.toUpperCase();
  const history = data.history || [];
  const today   = data.result || '----';

  const rows = history.slice(0, 12).map((h, i) => {
    const digits = (h.result || '----').split('')
      .map(c => /\d/.test(c) ? dSpan(c) : `<span style="color:var(--dim)">${c}</span>`)
      .join('');
    return `<div class="paito-row${i===0?' latest':''}">
      <div class="row-date">${fmtDate(h.date)}</div>
      <div class="row-digits">${digits}</div>
    </div>`;
  }).join('');

  const todayDigits = today.split('')
    .map(c => /\d/.test(c) ? dSpan(c) : `<span style="color:var(--dim)">${c}</span>`)
    .join('');

  return `<div class="card" data-key="${key}" data-name="${name.toLowerCase()}"
    style="animation-delay:${Math.min(idx,40)*15}ms">
    <div class="card-head">
      <div class="card-name">${name}</div>
      <span class="card-code">${code}</span>
      <span class="card-today">${todayDigits}</span>
    </div>
    ${rows || '<div class="no-data">belum ada history</div>'}
  </div>`;
}

// ── State ──
let rawData = {};

function renderAll(data) {
  const grid = document.getElementById('grid');
  const msg  = document.getElementById('msg');
  msg.style.display = 'none';

  // Hapus card lama
  grid.querySelectorAll('.card').forEach(c => c.remove());

  // Urutan: ORDER dulu, sisanya alphabetical
  const keys = Object.keys(data);
  const ordered = [
    ...ORDER.filter(k => keys.includes(k)),
    ...keys.filter(k => !ORDER.includes(k)).sort(),
  ];

  document.getElementById('count').textContent = ordered.length;

  const html = ordered.map((k, i) => makeCard(k, data[k], i)).join('');
  grid.insertAdjacentHTML('beforeend', html);
}

function applySearch() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  document.querySelectorAll('.card').forEach(c => {
    if (!q) { c.classList.remove('hidden'); return; }
    const match = c.dataset.key.includes(q) || c.dataset.name.includes(q);
    c.classList.toggle('hidden', !match);
  });
  const vis = document.querySelectorAll('.card:not(.hidden)').length;
  document.getElementById('count').textContent = vis;
}

async function loadData(force = false) {
  const statusEl = document.getElementById('status');
  const btnEl    = document.getElementById('btn-ref');
  const msg      = document.getElementById('msg');
  const luEl     = document.getElementById('last-updated');

  // Cek cache
  if (!force) {
    try {
      const c = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
      if (c && Date.now() - c.ts < CACHE_TTL && c.data) {
        rawData = c.data;
        statusEl.textContent = 'CACHE';
        statusEl.className   = 'ok';
        luEl.textContent     = 'cache · ' + new Date(c.ts).toLocaleTimeString('id');
        renderAll(rawData);
        btnEl.disabled = false;
        return;
      }
    } catch {}
  }

  statusEl.textContent = 'FETCH...';
  statusEl.className   = 'load';
  btnEl.disabled       = true;
  msg.textContent      = '⬡ MENGAMBIL DATA ⬡';
  msg.className        = 'load';
  msg.style.display    = 'block';
  document.querySelectorAll('.card').forEach(c => c.remove());

  try {
    const res = await fetch(RESULT_JSON + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    rawData = data;
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));

    statusEl.textContent = 'OK';
    statusEl.className   = 'ok';
    luEl.textContent     = 'update: ' + new Date().toLocaleTimeString('id');
    renderAll(rawData);
  } catch (e) {
    statusEl.textContent = 'ERROR';
    statusEl.className   = 'err';
    msg.textContent      = '⚠ Gagal load result.json\n' + e.message;
    msg.className        = 'err';
    msg.style.display    = 'block';
  } finally {
    btnEl.disabled = false;
  }
}

document.getElementById('btn-ref').addEventListener('click', () => loadData(true));
document.getElementById('search').addEventListener('input', applySearch);

loadData();
</script>
</body>
</html>
