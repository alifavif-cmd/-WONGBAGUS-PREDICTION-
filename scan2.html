<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCAN 2 – WONGBAGUS PREDICTION</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--gold:#f59e0b;--gold-light:#fcd34d;--gold-dark:#b45309;--red:#dc2626;--bg:#07070e;--bg2:#0f0f1a;--bg3:#15152a;--card:#111128;--border:rgba(245,158,11,0.15);--text:#e2e2f0;--muted:#6b6b8a;--green:#10b981;--cyan:#00d4ff;--purple:#9b5de5;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    header{position:sticky;top:0;z-index:99;background:rgba(7,7,14,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:10px 16px;}
    .header-inner{display:flex;align-items:center;gap:12px;}
    .back-btn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:7px 14px;color:var(--gold);font-size:13px;font-weight:700;text-decoration:none;display:flex;align-items:center;gap:6px;}
    .logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;background:linear-gradient(90deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .main{max-width:700px;margin:0 auto;padding:20px 14px 60px;}
    .page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,7vw,38px);letter-spacing:2px;color:var(--cyan);margin-bottom:4px;}
    .page-sub{font-size:12px;color:var(--muted);margin-bottom:22px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:16px;}
    .card-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
    select,input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;outline:none;margin-bottom:10px;}
    select:focus,input:focus{border-color:var(--gold);}
    .btn{width:100%;background:linear-gradient(135deg,var(--cyan),#0099bb);border:none;border-radius:12px;padding:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;color:#000;cursor:pointer;letter-spacing:.5px;transition:opacity .2s;}
    .btn:hover{opacity:.85;}
    .btn:disabled{opacity:.4;cursor:not-allowed;}
    .spinner{width:36px;height:36px;border:3px solid rgba(0,212,255,.2);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-wrap{text-align:center;padding:30px 0;display:none;}
    .loading-wrap.show{display:block;}
    .pair-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:10px;}
    .pair-chip{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.25);border-radius:8px;padding:8px 4px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--cyan);}
    .pair-chip.hot{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.4);color:var(--gold);}
    .pair-chip sub{display:block;font-family:'Nunito',sans-serif;font-size:9px;color:var(--muted);font-size:9px;letter-spacing:0;}
    .dr-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
    .dr-chip{background:rgba(155,93,229,.15);border:1px solid rgba(155,93,229,.3);border-radius:8px;padding:6px 12px;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--purple);}
    footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;border-top:1px solid var(--border);}
    .section-label{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="index.html" class="back-btn">← Kembali</a>
    <div class="logo-text">WONGBAGUS</div>
  </div>
</header>

<div class="main">
  <div class="page-title">🔬 SCAN 2</div>
  <div class="page-sub">Scanner Pola & Pasangan Angka</div>

  <div class="card">
    <div class="card-title">⚙️ Pengaturan</div>
    <select id="marketSel"><option value="">— Pilih Pasaran —</option></select>
    <select id="periodSel">
      <option value="14" selected>14 Periode</option>
      <option value="20">20 Periode</option>
      <option value="30">30 Periode</option>
    </select>
    <button class="btn" id="scanBtn" onclick="doScan()">🔍 SCAN POLA</button>
  </div>

  <div class="loading-wrap" id="loadingWrap">
    <div class="spinner"></div>
    <div style="color:var(--muted);font-size:13px;font-weight:700;">Menganalisis pola...</div>
  </div>

  <div id="resultSection"></div>
</div>
<footer>WONGBAGUS PREDICTION &copy; 2026</footer>

<script>
const RESULT_URL = 'https://alifavif-cmd.github.io/-WONGBAGUS-PREDICTION-/result.json';
let allData = null;
async function loadData(){if(allData)return allData;const r=await fetch(RESULT_URL);allData=await r.json();return allData;}

async function populateMarkets(){
  try{
    const data=await loadData();
    const sel=document.getElementById('marketSel');
    Object.keys(data).forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o);});
  }catch(e){}
}

function dr(n){let x=Math.abs(parseInt(n)||0);while(x>=10){x=String(x).split('').reduce((a,b)=>a+parseInt(b),0);}return x;}

async function doScan(){
  const marketId=document.getElementById('marketSel').value;
  const period=parseInt(document.getElementById('periodSel').value);
  if(!marketId){alert('Pilih pasaran!');return;}
  document.getElementById('loadingWrap').classList.add('show');
  document.getElementById('scanBtn').disabled=true;
  document.getElementById('resultSection').innerHTML='';
  try{
    const data=await loadData();
    const market=data[marketId];
    if(!market||!market.results||market.results.length<6)throw new Error('Data kurang');
    const results=market.results.slice(0,period+2);
    const twoDList=results.map(r=>{const s=String(r.result||r.number||r).padStart(4,'0');return s.slice(2);});
    
    // Frekuensi 2D
    const freq={};
    twoDList.forEach(d=>{freq[d]=(freq[d]||0)+1;});
    const topPairs=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,15);
    
    // DR distribution
    const drFreq={};
    twoDList.forEach(d=>{const v=dr(parseInt(d));drFreq[v]=(drFreq[v]||0)+1;});
    const topDR=Object.entries(drFreq).sort((a,b)=>b[1]-a[1]);
    
    // Consecutive pattern
    const gaps={};
    const lastSeen={};
    twoDList.forEach((d,i)=>{
      if(lastSeen[d]!==undefined){const g=i-lastSeen[d];gaps[g]=(gaps[g]||0)+1;}
      lastSeen[d]=i;
    });
    const avgGap=Object.entries(lastSeen).map(([d,last])=>({d,last})).sort((a,b)=>b.last-a.last);
    const duePairs=avgGap.filter(x=>x.last>3).slice(0,6).map(x=>x.d);

    const pairsHTML=topPairs.map(([p,c],i)=>`<div class="pair-chip${i<3?' hot':''}">${p}<sub>${c}x</sub></div>`).join('');
    const drHTML=topDR.map(([v,c])=>`<div class="dr-chip">DR${v} <span style="font-size:11px;font-family:Nunito,sans-serif;color:var(--muted);">(${c}x)</span></div>`).join('');
    const dueHTML=duePairs.map(p=>`<div class="pair-chip">${p}</div>`).join('');

    document.getElementById('resultSection').innerHTML=`
      <div class="card">
        <div class="card-title">📊 Top 15 Pasangan 2D — ${marketId}</div>
        <div class="section-label">${period} periode terakhir</div>
        <div class="pair-grid">${pairsHTML}</div>
      </div>
      <div class="card">
        <div class="card-title">🔢 Distribusi Digital Root</div>
        <div class="dr-row">${drHTML}</div>
      </div>
      <div class="card">
        <div class="card-title">⏰ Angka Telat Keluar</div>
        <div class="section-label">Belum keluar >3 periode</div>
        <div class="pair-grid">${dueHTML||'<span style="color:var(--muted);font-size:12px;">Semua angka merata</span>'}</div>
      </div>`;
  }catch(e){
    document.getElementById('resultSection').innerHTML=`<div class="card" style="border-color:rgba(220,38,38,.3);color:#f87171;">❌ Error: ${e.message}</div>`;
  }
  document.getElementById('loadingWrap').classList.remove('show');
  document.getElementById('scanBtn').disabled=false;
}
populateMarkets();
</script>
</body>
</html>
