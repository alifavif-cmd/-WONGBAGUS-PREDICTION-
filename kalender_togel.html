<style>

:root{--gold:#f59e0b;--gold-light:#fcd34d;--gold-dark:#b45309;--red:#dc2626;
  --bg:#07070e;--bg2:#0f0f1a;--bg3:#15152a;--card:#111128;
  --border:rgba(245,158,11,0.15);--text:#e2e2f0;--muted:#6b6b8a;
  --green:#10b981;--cyan:#00d4ff;--purple:#9b5de5;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.wb-header{position:sticky;top:0;z-index:99;background:rgba(7,7,14,.97);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:10px 14px;}
.wb-hi{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:10px;}
.wb-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--red));
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:14px;color:#fff;flex-shrink:0;}
.wb-pt{font-family:'Bebas Neue',sans-serif;font-size:clamp(14px,4vw,20px);
  letter-spacing:2px;background:linear-gradient(90deg,#fcd34d,#f59e0b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.wb-status{font-size:10px;color:var(--muted);margin-left:auto;white-space:nowrap;flex-shrink:0;}
.wb-back{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);
  border-radius:50px;padding:5px 12px;color:var(--gold);font-size:11px;font-weight:700;
  text-decoration:none;flex-shrink:0;}
.btn-ref{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);
  border-radius:50px;padding:5px 12px;font-size:11px;font-weight:700;color:var(--gold);
  cursor:pointer;display:inline-flex;align-items:center;gap:4px;flex-shrink:0;}
.btn-ref:hover{background:rgba(245,158,11,.2);}
.btn-ref.spin svg{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.container{max-width:900px;margin:0 auto;padding:12px 12px 50px;}
.sec-title{display:flex;align-items:center;gap:10px;margin:14px 0 10px;}
.sec-title h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(17px,5vw,23px);
  letter-spacing:1.5px;color:var(--gold-light);}
.sec-title .line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.badge{background:rgba(245,158,11,.1);border:1px solid var(--border);border-radius:50px;
  padding:2px 9px;font-size:10px;font-weight:700;color:var(--gold);}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px;}
.card-hdr{padding:10px 14px;background:rgba(245,158,11,.05);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;}
.card-hdr span{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:var(--gold-light);}
.card-body{padding:12px 14px;}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.tag{display:inline-flex;align-items:center;justify-content:center;
  border-radius:7px;padding:3px 11px;font-family:'Bebas Neue',sans-serif;font-size:17px;border:1.5px solid;}
.tag.g{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.4);color:var(--gold);}
.tag.r{background:rgba(220,38,38,.15);border-color:rgba(220,38,38,.4);color:#f87171;}
.tag.c{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.35);color:var(--cyan);}
.tag.gr{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.35);color:#34d399;}
.tag.m{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);color:var(--muted);}
.lbl{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px;}
.loading{text-align:center;padding:40px;color:var(--muted);}
.ld-dots{display:flex;gap:6px;justify-content:center;margin:10px auto;}
.ld{width:8px;height:8px;background:var(--gold);border-radius:50%;animation:lda .7s ease-in-out infinite;}
.ld:nth-child(2){animation-delay:.15s;}.ld:nth-child(3){animation-delay:.3s;}
@keyframes lda{0%,100%{transform:scale(.6);opacity:.4;}50%{transform:scale(1.2);opacity:1;}}
.dot-live{display:inline-block;width:6px;height:6px;background:var(--green);
  border-radius:50%;animation:blink 1.5s infinite;margin-right:3px;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.wb-table{width:100%;border-collapse:collapse;}
.wb-table th{padding:7px 10px;font-size:10px;font-weight:800;letter-spacing:.8px;
  text-transform:uppercase;color:var(--gold);border-bottom:1px solid var(--border);
  background:rgba(245,158,11,.04);}
.wb-table td{padding:6px 10px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03);}
.wb-table tr:hover td{background:rgba(245,158,11,.03);}
.rbadge{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--gold);}
.wb-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:20px;
  letter-spacing:4px;text-align:center;outline:none;transition:border-color .2s;}
.wb-input:focus{border-color:var(--gold);}
.wb-input.sm{font-family:'Nunito',sans-serif;font-size:14px;letter-spacing:0;text-align:left;}
.wb-btn{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#000;border:none;
  border-radius:10px;padding:11px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  cursor:pointer;width:100%;margin-top:8px;}
.wb-btn:hover{opacity:.88;}
.wb-btn.sec{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:var(--gold);}
.wb-tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px;}
.wb-tabs::-webkit-scrollbar{display:none;}
.wb-tab{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:50px;
  padding:6px 13px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;
  transition:all .15s;white-space:nowrap;}
.wb-tab.on,.wb-tab:hover{background:rgba(245,158,11,.15);border-color:var(--gold);color:var(--gold);}
.wb-pane{display:none;}.wb-pane.on{display:block;}
.dchip{width:31px;height:31px;border-radius:7px;display:inline-flex;align-items:center;
  justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:17px;}
.dchip.hot{background:rgba(220,38,38,.3);border:1.5px solid rgba(220,38,38,.5);color:#fca5a5;}
.dchip.warm{background:rgba(245,158,11,.22);border:1.5px solid rgba(245,158,11,.45);color:var(--gold);}
.dchip.cool{background:rgba(37,99,235,.2);border:1.5px solid rgba(37,99,235,.4);color:#93c5fd;}
.dchip.cold{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);color:var(--muted);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--gold);}
.stat-lbl{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-top:2px;}
footer{text-align:center;padding:16px;color:var(--muted);font-size:10px;border-top:1px solid var(--border);}
#scrollTop{position:fixed;bottom:18px;right:14px;width:38px;height:38px;background:var(--gold);
  border:none;border-radius:50%;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:50;}
#scrollTop.v{display:flex;}


</style>

  './result.json',

];
async function fetchRJ(){
  for(const u of RJ_URLS){
    try{
      const r=await Promise.race([
        fetch(u+'?t='+Date.now(),{cache:'no-cache'}),
        new Promise((_,rj)=>setTimeout(()=>rj(new Error('to')),10000))
      ]);
      if(!r.ok)continue;
      const d=await r.json();
      if(d&&Object.keys(d).length>5)return d;
    }catch(e){}
  }
  return null;
}

  {id:'or10',flag:'🇺🇸',name:'Oregon 10',s:'OR10'},{id:'or13',flag:'🇺🇸',name:'Oregon 13',s:'OR13'},

  {id:'mie',flag:'🇺🇸',name:'Michigan Eve',s:'MIE'},{id:'mom',flag:'🇺🇸',name:'Missouri Mid',s:'MOM'},
  {id:'moe',flag:'🇺🇸',name:'Missouri Eve',s:'MOE'},{id:'wdm',flag:'🇺🇸',name:'WDC Mid',s:'WDM'},
  {id:'wde',flag:'🇺🇸',name:'WDC Eve',s:'WDE'},{id:'ctd',flag:'🇺🇸',name:'Conn Day',s:'CTD'},

  {id:'tne',flag:'🇺🇸',name:'Tenn Eve',s:'TNE'},{id:'tnmr',flag:'🇺🇸',name:'Tenn Morning',s:'TNMR'},
  {id:'cal',flag:'🇺🇸',name:'California',s:'CAL'},{id:'wie',flag:'🇺🇸',name:'Wisconsin Eve',s:'WIE'},
  {id:'wim',flag:'🇺🇸',name:'Wisconsin Mid',s:'WIM'},
];


window.addEventListener('scroll',()=>{
  const e=document.getElementById('scrollTop');
  if(e)e.classList.toggle('v',window.scrollY>200);
});
function setStatus(h){const e=document.getElementById('pageStatus');if(e)e.innerHTML=h;}
async function doRefresh(){
  const b=document.getElementById('btnRef');
  if(b){b.disabled=true;b.classList.add('spin');}
  await init();
  if(b){b.disabled=false;b.classList.remove('spin');}
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}


const SCHED={hk:'23:00',hkl:'23:00',sgp:'17:40',sdy:'13:45',sdl:'13:45',kam:'11:50',bull:'13:10',chn:'15:30',jpn:'17:20',twn:'20:45',pcso:'20:10',mac1:'13:10',mac2:'16:10',mac3:'19:10',mac4:'22:10',mac5:'00:11',mac6:'23:10',mrq3:'03:00',mrq18:'18:00',mrq21:'21:00',mrq23:'23:59',ger:'01:10',or4:'04:00',or7:'07:00',or10:'10:00',or13:'13:00',ncd:'03:00',nce:'11:22',geom:'00:29',geoe:'07:00',geon:'11:34',txd:'01:27',txmr:'22:00',txe:'07:00',txn:'11:12',nyd:'02:30',nye:'10:30',njm:'00:59',nje:'10:56',flm:'01:30',fle:'09:45',ilm:'01:40',ile:'10:20',indm:'01:20',inde:'10:50',kym:'01:21',kye:'11:00',mdm:'23:28',mde:'07:55',mim:'23:30',mie:'07:29',mom:'01:45',moe:'09:59',wdm:'01:55',wde:'07:57',ctd:'01:57',ctn:'10:29',vad:'02:00',van:'11:00',tnm:'01:20',tne:'07:20',tnmr:'22:22',cal:'09:30',wie:'10:00',wim:'01:40'};
let RJ=null;
async function init(){
  setStatus('⏳ Memuat...');
  RJ=await fetchRJ();
  renderKal();
}
function renderKal(){
  const now=new Date();
  const days=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const mon=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const todayStr=`${days[now.getDay()]}, ${now.getDate()} ${mon[now.getMonth()]} ${now.getFullYear()}`;
  const nowM=now.getHours()*60+now.getMinutes();
  let sudah=0,belum=0,live=0;
  const rows=MKT.map(m=>{
    const e=RJ?RJ[m.id]||{}:{};
    const result=e.result||'----',status=e.status||'belum';
    const time=SCHED[m.id]||'--:--';
    const [th,tm]=time.split(':').map(Number);
    const sm=isNaN(th)?-1:th*60+tm;
    let lbl,col;
    if(/^\d{4}$/.test(result)&&status==='sudah'){lbl='✅ Sudah';col='#34d399';sudah++;}
    else if(sm>=0&&Math.abs(nowM-sm)<30){lbl='🔴 LIVE';col='#f87171';live++;}
    else{lbl='⏳ Belum';col='var(--muted)';belum++;}
    return {m,result,time,lbl,col};
  }).sort((a,b)=>a.time.localeCompare(b.time));
  document.getElementById('bkal').textContent=sudah+' sudah';
  document.getElementById('kalToday').innerHTML=`
  <div style="padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold-light);letter-spacing:1px;">${todayStr}</div>
    <div style="display:flex;gap:16px;margin-top:8px;font-size:12px;">
      <span style="color:#34d399;">✅ ${sudah} Sudah</span>
      <span style="color:var(--muted);">⏳ ${belum} Belum</span>
      ${live>0?`<span style="color:#f87171;">🔴 ${live} Live</span>`:''}
    </div>
  </div>`;
  document.getElementById('tblKal').innerHTML=`<table class="wb-table"><thead><tr>
    <th>Jam WIB</th><th>Pasaran</th><th>Result</th><th>Status</th></tr></thead><tbody>${
    rows.map(({m,result,time,lbl,col})=>`<tr>
      <td style="font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;">${time}</td>
      <td>${m.flag} <strong>${m.s}</strong><br><span style="font-size:10px;color:var(--muted);">${m.name}</span></td>
      <td class="rbadge">${result}</td>
      <td><span style="font-size:10px;font-weight:700;color:${col};">${lbl}</span></td></tr>`).join('')
  }</tbody></table>`;
  setStatus(`<span class="dot-live"></span>${sudah}/65 sudah · ${now.toLocaleTimeString('id-ID')}`);
}

init();
</script>
