name: 🎰 Auto Fetch Togel Results

on:
  # ── Jadwal otomatis setiap 30 menit ──────────────────────────────────────
  schedule:
    - cron: '*/30 * * * *'   # UTC — setara 07:00–00:00 WIB (×2 per jam)

  # ── Bisa dipicu manual dari tab Actions ──────────────────────────────────
  workflow_dispatch:
    inputs:
      force_note:
        description: 'Catatan (opsional)'
        required: false
        default: 'manual trigger'

# Hanya 1 job fetch yang boleh jalan sekaligus (cegah race condition)
concurrency:
  group: fetch-togel
  cancel-in-progress: false

jobs:
  fetch:
    name: Fetch & Commit result.json
    runs-on: ubuntu-latest
    timeout-minutes: 15        # kill kalau hang > 15 menit

    permissions:
      contents: write          # izin push ke repo

    steps:
      # ── 1. Checkout kode ─────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1       # shallow clone, cukup commit terakhir

      # ── 2. Setup Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependensi ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 urllib3

      # ── 4. Jalankan fetch_all.py ─────────────────────────────────────────
      - name: Run fetch_all.py
        run: python fetch_all.py
        env:
          PYTHONUNBUFFERED: '1'  # output log langsung terlihat di Actions

      # ── 5. Commit & push result.json (hanya kalau ada perubahan) ─────────
      - name: Commit result.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add result.json

          # Hanya commit kalau result.json benar-benar berubah
          if git diff --staged --quiet; then
            echo "✅ result.json tidak berubah, skip commit."
          else
            # Buat pesan commit dengan waktu WIB (UTC+7)
            TIMESTAMP=$(TZ='Asia/Jakarta' date '+%Y-%m-%d %H:%M WIB')
            git commit -m "🎰 auto: update result.json — ${TIMESTAMP}"
            git push
            echo "🚀 result.json berhasil di-push ke repo."
          fi
