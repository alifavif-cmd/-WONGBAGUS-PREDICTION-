name: Fetch Togel Results

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run debug_html.py
        run: python debug_html.py

      - name: Commit debug files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add debug_*.txt 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" || git commit -m "debug: dump angkanet HTML structure"
          git push
