name: Auto Fetch Result Togel

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 urllib3

      - name: Run fetch_all.py
        run: python fetch_all.py

      - name: Commit and push result.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add result.json
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan, skip."
          else
            git commit -m "auto: update result.json $(date +'%Y-%m-%d %H:%M WIB')"
            git pull --rebase origin main
            git push
          fi
