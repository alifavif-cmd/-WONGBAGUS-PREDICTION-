name: Update HK Data

on:
  schedule:
    - cron: '30 16 * * *'   # 23:30 WIB setiap hari (16:30 UTC)
    - cron: '0 17 * * *'    # 00:00 WIB (backup jika 23:30 belum keluar)
  workflow_dispatch:         # bisa run manual dari GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run fetch script
        run: python fetch_hk.py

      - name: Commit & push jika ada perubahan
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hk.json
          git diff --staged --quiet || git commit -m "update: HK data $(date +'%Y-%m-%d %H:%M WIB' -d '+7 hours')"
          git push
