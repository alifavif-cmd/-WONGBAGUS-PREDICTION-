name: fetch-and-push

on:
  schedule:
    # Jadwal: Setiap hari jam 23:00 WIB (UTC+7)
    - cron: '0 16 * * *' 
  workflow_dispatch: # Untuk trigger manual dari UI GitHub

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Debug HTML (Optional)
        run: |
          echo "Checking connectivity to angkanet18.com..."
          curl -s https://angkanet18.com/paito-harian/ | head -n 20

      - name: Run fetch_all.py
        # ✅ DIPERBAIKI: Gunakan command sederhana. GitHub Actions sudah berada di root folder.
        run: python fetch_all.py

      - name: Commit and push results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add result.json
          git commit -m "Update results $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin main
