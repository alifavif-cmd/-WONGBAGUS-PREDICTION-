name: Auto Fetch Result Togel

on:
  schedule:
    # Setiap 5 menit, 24 jam sehari, 7 hari seminggu
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      run_backfill:
        description: 'Jalankan backfill history? (yes/no)'
        required: false
        default: 'no'

permissions:
  contents: write

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 urllib3

      # 4. Backfill history (hanya jika diminta via workflow_dispatch)
      - name: Backfill History (manual only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_backfill == 'yes'
        run: python backfill_history.py
        env:
          TZ: Asia/Jakarta

      # 5. Jalankan fetch_all.py
      - name: Run fetch_all.py
        run: python fetch_all.py
        env:
          TZ: Asia/Jakarta

      # 6. Commit & push result.json dengan retry
      - name: Commit and push result.json
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add result.json
          # Skip kalau tidak ada perubahan
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan, skip commit."
            exit 0
          fi
          WAKTU=$(TZ=Asia/Jakarta date +'%Y-%m-%d %H:%M WIB')
          git commit -m "auto: update result.json $WAKTU"
          # Retry push sampai 5x
          n=0
          until [ $n -ge 5 ]; do
            git push && echo "Push berhasil." && exit 0
            n=$((n+1))
            echo "Push gagal, retry $n/5 dalam 15 detik..."
            sleep 15
            git pull --rebase origin main 2>/dev/null || true
          done
          echo "Push tetap gagal setelah 5x — tapi workflow tetap lanjut."
          exit 0
