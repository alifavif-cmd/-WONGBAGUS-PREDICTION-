name: Auto Fetch Result Togel

on:
  schedule:
    - cron: '*/10 * * * *'  # Setiap 10 menit (lebih aman dari 5 menit)
  workflow_dispatch:         # Bisa dijalankan manual

permissions:
  contents: write

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 8       # Naik dari 5 → 8 menit (cukup untuk 64 pasaran)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # v4 bukan v3 (v3 deprecated Node.js 16)
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5   # v5 bukan v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 urllib3

      - name: Run fetch_all.py
        run: python fetch_all.py

      - name: Commit and push result.json
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add result.json

          if ! git diff --cached --quiet; then
            git commit -m "Update result.json $(date +'%Y-%m-%d %H:%M:%S')"
            for i in {1..5}; do
              git pull --rebase origin main && break || sleep 10
            done
            git push origin main
          else
            echo "No changes to commit."
          fi
