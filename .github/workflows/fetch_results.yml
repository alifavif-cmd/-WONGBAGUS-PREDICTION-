name: Auto Fetch Result Togel

on:
  schedule:
    - cron: '*/5 * * * *' # Setiap 5 menit
  workflow_dispatch: # Bisa dijalankan manual

permissions:
  contents: write

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 urllib3 lxml

      - name: Debug HTML (Optional)
        run: python debug_html_struct.py
        continue-on-error: true

      - name: Run fetch_all.py
        run: python fetch_all.py

      - name: Commit and push result.json
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add result.json
          
          # Cek apakah ada perubahan
          if ! git diff --cached --quiet; then
            git commit -m "Update result.json on $(date +'%Y-%m-%d %H:%M:%S') WIB"
            
            # Push dengan retry mechanism
            for i in {1..5}; do
              git pull --rebase origin main && break || sleep 15
            done
            git push origin main
          else
            echo "No changes to commit."
          fi
