name: Auto Fetch Result Togel

on:
  schedule:
    # Setiap 1 jam (24x sehari) — aman, data lama dijaga jika belum keluar
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml urllib3

      - name: Run fetch_all.py
        run: python fetch_all.py

      - name: Commit and push result.json
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"

          if [ ! -f result.json ]; then
            echo "result.json tidak ada, skip commit."
            exit 0
          fi

          git add result.json

          if ! git diff --cached --quiet; then
            git commit -m "Update result.json $(date +'%Y-%m-%d %H:%M:%S')"
            for i in {1..5}; do
              git pull --rebase origin main && break || sleep 10
            done
            git push origin main
          else
            echo "No changes to commit."
          fi
