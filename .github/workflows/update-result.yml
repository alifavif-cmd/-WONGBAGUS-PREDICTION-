# File ini: .github/workflows/update-result.yml

name: Auto Update result.json

on:
  schedule:
    - cron: '5 * * * *'   # setiap jam menit ke-5 (UTC)
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    # Cegah 2 workflow jalan bersamaan → menghindari konflik push
    concurrency:
      group: update-result
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 urllib3

      # Jalankan scraper — TANPA GitHub API push (git step di bawah yang handle)
      - name: Run scraper
        run: python fetch_all.py

      - name: Commit & push result.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add result.json
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan, skip commit."
          else
            git commit -m "Auto-update result.json $(date +'%Y-%m-%d %H:%M WIB')"
            git pull --rebase origin main
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
