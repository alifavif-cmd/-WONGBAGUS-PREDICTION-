# File ini: .github/workflows/update-result.yml
# Letakkan di dalam repo GitHub kamu di path: .github/workflows/update-result.yml

name: Auto Update result.json

on:
  schedule:
    # Jalan setiap jam (menit ke-5) — waktu UTC, WIB = UTC+7
    # Sesuaikan jadwal sesuai jam tutup pasaran kamu
    - cron: '5 * * * *'

  # Bisa juga dijalankan manual dari tab Actions di GitHub
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 urllib3

      - name: Run scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python fetch_all.py

      # Commit result.json langsung via git (alternatif dari GitHub API)
      - name: Commit & push result.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add result.json
          git diff --cached --quiet || git commit -m "Auto-update result.json $(date +'%Y-%m-%d %H:%M WIB')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
