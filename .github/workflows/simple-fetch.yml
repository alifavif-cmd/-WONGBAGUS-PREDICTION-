name: Simple Fetch

on: [workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List files in root
        run: ls -la

      - name: Check if fetch_all.py exists
        run: |
          if [ -f "fetch_all.py" ]; then
            echo "✅ fetch_all.py FOUND!"
          else
            echo "❌ fetch_all.py NOT FOUND!"
            exit 1
          fi

      - name: Run Python script
        run: python fetch_all.py

      - name: Show result.json content
        run: cat result.json || echo "result.json not created"
