<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCAN 1 – WONGBAGUS PREDICTION</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--gold:#f59e0b;--gold-light:#fcd34d;--gold-dark:#b45309;--red:#dc2626;--bg:#07070e;--bg2:#0f0f1a;--bg3:#15152a;--card:#111128;--border:rgba(245,158,11,0.15);--text:#e2e2f0;--muted:#6b6b8a;--green:#10b981;--cyan:#00d4ff;--purple:#9b5de5;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    header{position:sticky;top:0;z-index:99;background:rgba(7,7,14,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:10px 16px;}
    .header-inner{display:flex;align-items:center;gap:12px;}
    .back-btn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:7px 14px;color:var(--gold);font-size:13px;font-weight:700;text-decoration:none;display:flex;align-items:center;gap:6px;}
    .logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;background:linear-gradient(90deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .main{max-width:700px;margin:0 auto;padding:20px 14px 60px;}
    .page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,7vw,38px);letter-spacing:2px;color:var(--gold-light);margin-bottom:4px;}
    .page-sub{font-size:12px;color:var(--muted);margin-bottom:22px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:16px;}
    .card-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
    select,input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;outline:none;margin-bottom:10px;}
    select:focus,input:focus{border-color:var(--gold);}
    .btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;border-radius:12px;padding:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;color:#000;cursor:pointer;letter-spacing:.5px;transition:opacity .2s;}
    .btn:hover{opacity:.85;}
    .btn:disabled{opacity:.4;cursor:not-allowed;}
    .result-box{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.2);border-radius:12px;padding:14px;margin-top:14px;display:none;}
    .result-box.show{display:block;}
    .result-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;}
    .result-row:last-child{border-bottom:none;}
    .result-label{color:var(--muted);font-weight:700;}
    .result-value{color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;}
    .badge-hit{background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.4);color:#34d399;border-radius:6px;padding:2px 10px;font-size:11px;font-weight:800;}
    .badge-miss{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);color:#f87171;border-radius:6px;padding:2px 10px;font-size:11px;font-weight:800;}
    .loading-wrap{text-align:center;padding:30px 0;display:none;}
    .loading-wrap.show{display:block;}
    .spinner{width:36px;height:36px;border:3px solid rgba(245,158,11,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
    .stat-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 8px;text-align:center;}
    .stat-val{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--gold);}
    .stat-lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;margin-top:2px;}
    footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;border-top:1px solid var(--border);}
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="index.html" class="back-btn">← Kembali</a>
    <div class="logo-text">WONGBAGUS</div>
  </div>
</header>

<div class="main">
  <div class="page-title">⚡ SCAN 1</div>
  <div class="page-sub">Scanner Rumus Otomatis — Periode 1</div>

  <div class="card">
    <div class="card-title">⚙️ Pengaturan Scan</div>
    <select id="marketSel">
      <option value="">— Pilih Pasaran —</option>
    </select>
    <select id="periodSel">
      <option value="7">7 Periode Terakhir</option>
      <option value="14" selected>14 Periode Terakhir</option>
      <option value="30">30 Periode Terakhir</option>
    </select>
    <select id="posSel">
      <option value="2d">2D Belakang</option>
      <option value="as">AS</option>
      <option value="kop">KOP</option>
      <option value="kepala">KEPALA</option>
      <option value="ekor">EKOR</option>
    </select>
    <button class="btn" id="scanBtn" onclick="doScan()">🔍 MULAI SCAN</button>
  </div>

  <div class="loading-wrap" id="loadingWrap">
    <div class="spinner"></div>
    <div style="color:var(--muted);font-size:13px;font-weight:700;">Memuat data & scanning...</div>
  </div>

  <div id="statsSection" style="display:none;">
    <div class="card-title" style="margin-top:4px;">📊 Statistik Scan</div>
    <div class="stats-grid" id="statsGrid"></div>
  </div>

  <div id="resultSection"></div>
</div>

<footer>WONGBAGUS PREDICTION &copy; 2026</footer>

<script>
const RESULT_URL = 'https://alifavif-cmd.github.io/-WONGBAGUS-PREDICTION-/result.json';
let allData = null;

async function loadData() {
  if (allData) return allData;
  const r = await fetch(RESULT_URL);
  allData = await r.json();
  return allData;
}

async function populateMarkets() {
  try {
    const data = await loadData();
    const sel = document.getElementById('marketSel');
    const markets = Object.keys(data);
    markets.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      sel.appendChild(opt);
    });
  } catch(e) {
    console.error(e);
  }
}

function getDigit(result4d, pos) {
  const s = String(result4d).padStart(4,'0');
  if (pos === 'as') return s[0];
  if (pos === 'kop') return s[1];
  if (pos === 'kepala') return s[2];
  if (pos === 'ekor') return s[3];
  if (pos === '2d') return s.slice(2);
  return s.slice(2);
}

function digitalRoot(n) {
  let x = Math.abs(parseInt(n));
  while (x >= 10) { x = String(x).split('').reduce((a,b)=>a+parseInt(b),0); }
  return x;
}

async function doScan() {
  const marketId = document.getElementById('marketSel').value;
  const period = parseInt(document.getElementById('periodSel').value);
  const pos = document.getElementById('posSel').value;
  if (!marketId) { alert('Pilih pasaran dulu!'); return; }

  document.getElementById('loadingWrap').classList.add('show');
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('resultSection').innerHTML = '';
  document.getElementById('statsSection').style.display = 'none';

  try {
    const data = await loadData();
    const market = data[marketId];
    if (!market || !market.results || market.results.length < 5) {
      throw new Error('Data tidak cukup');
    }

    const results = market.results.slice(0, period + 5);
    const digits = results.map(r => getDigit(r.result || r.number || r, pos));

    // Simple pattern analysis
    const freq = {};
    digits.forEach(d => { freq[d] = (freq[d]||0)+1; });
    const sorted = Object.entries(freq).sort((a,b)=>b[1]-a[1]);

    // Generate predictions
    const recent = digits.slice(0, 5);
    const drValues = recent.map(d => digitalRoot(parseInt(d)));
    
    let hitCount = 0;
    let totalChecked = period;

    const html = sorted.slice(0,10).map(([digit, count], i) => {
      const pct = ((count / digits.length)*100).toFixed(0);
      const isHit = recent.includes(digit);
      if (isHit) hitCount++;
      return `<div class="result-row">
        <span class="result-label">${i+1}. Angka ${digit}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:11px;color:var(--muted);">${count}x (${pct}%)</span>
          <span class="result-value">${digit}</span>
          <span class="${isHit?'badge-hit':'badge-miss'}">${isHit?'PANAS':'DINGIN'}</span>
        </div>
      </div>`;
    }).join('');

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-box"><div class="stat-val">${period}</div><div class="stat-lbl">Periode</div></div>
      <div class="stat-box"><div class="stat-val">${sorted.length}</div><div class="stat-lbl">Variasi</div></div>
      <div class="stat-box"><div class="stat-val">${sorted[0]?.[0]||'-'}</div><div class="stat-lbl">Terpanas</div></div>
    `;

    document.getElementById('resultSection').innerHTML = `
      <div class="card">
        <div class="card-title">📋 Hasil Scan — ${marketId}</div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">Posisi: ${pos.toUpperCase()} · ${period} periode · 5 terbaru: ${recent.join(' ')}</div>
        <div class="result-box show">${html}</div>
      </div>`;

    document.getElementById('statsSection').style.display = 'block';
  } catch(e) {
    document.getElementById('resultSection').innerHTML = `<div class="card" style="border-color:rgba(220,38,38,.3);color:#f87171;">❌ Error: ${e.message}</div>`;
  }

  document.getElementById('loadingWrap').classList.remove('show');
  document.getElementById('scanBtn').disabled = false;
}

populateMarkets();
</script>
</body>
</html>
