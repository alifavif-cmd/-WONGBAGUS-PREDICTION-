<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Paito Warna 2026 — WONGBAGUS PREDICTION</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#f59e0b;--gold-light:#fcd34d;--gold-dark:#b45309;--bg:#07070e;--bg2:#0f0f1a;--bg3:#15152a;--card:#111128;--border:rgba(245,158,11,0.15);--text:#e2e2f0;--muted:#6b6b8a;--green:#10b981;--red:#dc2626;--teal:#0d9488;--cyan:#00d4ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;top:-150px;right:-150px;width:500px;height:500px;background:radial-gradient(circle,rgba(13,148,136,.05) 0%,transparent 70%);pointer-events:none;z-index:0;}

.topbar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(7,7,14,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:99;}
.topbar-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--red));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:16px;color:#000;text-decoration:none;flex-shrink:0;}
.topbar-info{flex:1;}
.topbar-title{font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;background:linear-gradient(90deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.topbar-sub{font-size:10px;color:var(--muted);font-weight:600;}
.topbar-back{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-family:'Nunito';font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s;flex-shrink:0;}
.topbar-back:hover{border-color:var(--gold);color:var(--gold);}

.container{max-width:640px;margin:0 auto;padding:16px;position:relative;z-index:1;}
.page-hero{text-align:center;padding:20px 0 6px;}
.page-hero-icon{font-size:36px;margin-bottom:8px;}
.page-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;color:var(--teal);line-height:1;}
.page-sub{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.6;}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.card-title::before{content:'';display:block;width:3px;height:14px;background:#0d9488;border-radius:2px;}

label{font-size:11px;color:var(--muted);font-weight:800;display:block;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
select,input,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Nunito';font-size:14px;font-weight:600;width:100%;outline:none;margin-bottom:12px;transition:border-color .2s;}
select:focus,input:focus,textarea:focus{border-color:#0d9488;}
textarea{resize:vertical;min-height:100px;font-size:13px;letter-spacing:.5px;line-height:1.6;}

.label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.label-row label{margin-bottom:0;}
.result-hint{font-size:11px;color:var(--green);font-weight:700;min-height:18px;margin:-8px 0 10px;}

.btn-autofill{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:var(--green);border-radius:8px;padding:5px 12px;font-family:'Nunito';font-size:12px;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap;}
.btn-autofill:hover{background:rgba(16,185,129,.25);}
.btn-autofill:disabled{opacity:.4;cursor:not-allowed;}

.btn-row{display:flex;gap:8px;}
.btn{padding:11px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Nunito';font-size:13px;font-weight:800;transition:.2s;flex:1;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-teal{background:linear-gradient(135deg,#0d9488,#0f766e);color:#fff;box-shadow:0 4px 16px rgba(13,148,136,.25);}
.btn-teal:hover{opacity:.9;}
.btn-ai{background:linear-gradient(135deg,#7c3aed,#4c1d95);color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.25);}
.btn-ai:hover{opacity:.9;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}

/* LEGEND */
.legend-wrap{display:flex;flex-wrap:wrap;gap:10px;padding:10px 16px;border-top:1px solid var(--border);margin-top:4px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);font-weight:600;}
.legend-dot{width:14px;height:14px;border-radius:4px;}

/* PAITO TABLE */
.paito-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.paito-table{border-collapse:collapse;width:100%;min-width:320px;}
.paito-table th{background:rgba(245,158,11,.06);color:var(--gold);font-size:10px;font-weight:800;padding:8px 6px;text-align:center;border-bottom:1px solid var(--border);letter-spacing:.5px;}
.paito-table td{padding:4px 3px;text-align:center;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03);}
.paito-table tr:hover td{background:rgba(245,158,11,.03);}
.paito-table .td-date{font-size:10px;color:var(--muted);white-space:nowrap;text-align:left;padding-left:8px;}
.p-cell{width:26px;height:26px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:14px;font-weight:700;}
.p-hot{background:rgba(239,68,68,.8);color:#fff;border:1px solid rgba(239,68,68,.9);}
.p-warm{background:rgba(245,158,11,.7);color:#000;border:1px solid rgba(245,158,11,.8);}
.p-mid{background:rgba(16,185,129,.55);color:#fff;border:1px solid rgba(16,185,129,.7);}
.p-cold{background:rgba(99,102,241,.45);color:#fff;border:1px solid rgba(99,102,241,.6);}
.p-dead{background:rgba(107,114,128,.25);color:var(--muted);border:1px solid rgba(107,114,128,.3);}

/* HEATMAP */
.heatmap-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin-top:8px;}
.hm-cell{border-radius:8px;padding:8px 4px;text-align:center;font-weight:900;font-size:13px;}
.hm-label{font-size:9px;font-weight:700;margin-top:2px;opacity:.8;}

/* POS STATS */
.pos-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.pos-stat-box{background:var(--bg3);border-radius:10px;padding:10px;text-align:center;}
.pos-stat-title{font-size:10px;font-weight:800;color:var(--muted);margin-bottom:8px;letter-spacing:.5px;}
.pos-top{display:flex;flex-direction:column;gap:4px;}
.pos-chip{display:flex;align-items:center;justify-content:center;gap:4px;padding:3px 0;}
.pos-chip-num{font-family:'Bebas Neue';font-size:18px;color:var(--gold);}
.pos-chip-freq{font-size:9px;color:var(--muted);font-weight:700;}

/* AI BOX */
.ai-box{background:linear-gradient(135deg,rgba(13,148,136,.1),rgba(15,118,110,.05));border:1px solid rgba(13,148,136,.3);border-radius:12px;padding:14px;margin-top:10px;}
.ai-box-title{font-size:11px;font-weight:800;color:#2dd4bf;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.ai-tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.ai-tag{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid;}
.ai-tag-teal{background:rgba(13,148,136,.15);border-color:rgba(13,148,136,.4);color:#2dd4bf;}
.ai-tag-gold{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.4);color:var(--gold);}
.ai-tag-red{background:rgba(220,38,38,.15);border-color:rgba(220,38,38,.4);color:#f87171;}
.rekomendasi-big{font-family:'Bebas Neue';font-size:40px;letter-spacing:6px;color:var(--gold);}
.divider{height:1px;background:var(--border);margin:12px 0;}

/* LOADING */
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.spin{animation:spin .8s linear infinite;display:inline-block;}
.loading-dots{display:flex;justify-content:center;gap:5px;margin-top:10px;}
.loading-dots span{width:6px;height:6px;background:#0d9488;border-radius:50%;animation:pulse .8s ease-in-out infinite;}
.loading-dots span:nth-child(2){animation-delay:.15s;}
.loading-dots span:nth-child(3){animation-delay:.3s;}

footer{text-align:center;padding:24px 16px;border-top:1px solid var(--border);margin-top:20px;color:var(--muted);font-size:11px;}
footer a{color:var(--gold);text-decoration:none;}
</style>
<script src="./wb_data.js"></script>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-logo">WB</a>
  <div class="topbar-info">
    <div class="topbar-title">WONGBAGUS PREDICTION</div>
    <div class="topbar-sub">SMART PAITO WARNA 2026</div>
  </div>
  <a href="index.html" class="topbar-back">← Beranda</a>
</div>

<div class="container">
  <div class="page-hero">
    <div class="page-hero-icon">🎨</div>
    <div class="page-title">Smart Paito Warna</div>
    <p class="page-sub">Visualisasi pola angka · Heatmap · Bot AI Analisa Otomatis</p>
  </div>

  <div class="card">
    <div class="card-title">Konfigurasi Paito</div>

    <label>Pasaran <span id="dataStatus" style="text-transform:none;font-size:10px;color:var(--muted);font-weight:600;"></span></label>
    <select id="pasaran" onchange="onPasaranChange()">
      <option value="">⏳ Memuat 65 pasaran...</option>
    </select>
    <div class="result-hint" id="resultHint"></div>

    <div class="label-row">
      <label>Data Result <span id="historyCountLabel" style="text-transform:none;font-size:10px;color:var(--muted);font-weight:600;"></span></label>
      <button class="btn-autofill" id="btnAutoFill" onclick="addTerkini()" disabled>📡 + Hari Ini</button>
    </div>
    <textarea id="dataInput" placeholder="⏳ Pilih pasaran → history 30 hari auto-muat...&#10;&#10;Atau isi manual:&#10;2026-05-24 6284&#10;2026-05-23 5351&#10;...minimal 3 data"></textarea>

    <div class="btn-row">
      <button class="btn btn-teal" onclick="generatePaito()">🎨 Buat Paito</button>
      <button class="btn btn-ai" onclick="aiAnalyze()">🤖 AI Analisa</button>
    </div>
  </div>

  <!-- LEGEND -->
  <div class="card" style="padding:12px 16px 4px;">
    <div style="font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;">🎨 Keterangan Warna</div>
    <div class="legend-wrap" style="padding:0;border:none;margin:0;">
      <div class="legend-item"><div class="legend-dot" style="background:rgba(239,68,68,.8);"></div>Panas ≥4×</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(245,158,11,.7);"></div>Hangat 3×</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(16,185,129,.55);"></div>Normal 2×</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(99,102,241,.45);"></div>Dingin 1×</div>
      <div class="legend-item"><div class="legend-dot" style="background:rgba(107,114,128,.25);border:1px solid rgba(255,255,255,.1);"></div>Mati 0×</div>
    </div>
  </div>

  <div id="paitoResult"></div>
</div>

<footer>
  <strong>WONGBAGUS PREDICTION</strong> · Smart Paito Warna 2026<br>
  <a href="index.html">← Kembali ke Beranda</a>
</footer>

<script>
function getGroqKey(){return localStorage.getItem('wb_groq_key')||'';}
window._parsedData=[];

function parseInput(){
  const raw=document.getElementById('dataInput').value.trim();
  if(!raw)return[];
  return raw.split('\n').map(line=>{
    const parts=line.trim().split(/\s+/);
    if(parts.length>=2){return{date:parts[0],angka:parts[parts.length-1].padStart(4,'0')};}
    else if(parts.length===1&&parts[0].length===4&&!isNaN(parts[0])){return{date:'-',angka:parts[0]};}
    return null;
  }).filter(d=>d&&/^\d{4}$/.test(d.angka));
}

function getColor(f){return f>=4?'hot':f===3?'warm':f===2?'mid':f===1?'cold':'dead';}

function generatePaito(){
  const data=parseInput();
  if(data.length<3){alert('Minimal 3 data result!');return;}
  window._parsedData=data;
  const freq={AS:{},KOP:{},KEP:{},EK:{}};const allFreq={};
  data.forEach(d=>{
    if(d.angka.length<4)return;
    ['AS','KOP','KEP','EK'].forEach((pos,i)=>{const dig=d.angka[i];freq[pos][dig]=(freq[pos][dig]||0)+1;});
    [...d.angka].forEach(dig=>{allFreq[dig]=(allFreq[dig]||0)+1;});
  });
  const tableRows=data.map(d=>{
    if(d.angka.length<4)return'';
    const cells=['AS','KOP','KEP','EK'].map((pos,i)=>{
      const dig=d.angka[i];const f=freq[pos][dig]||0;
      return`<td><span class="p-cell p-${getColor(f)}">${dig}</span></td>`;
    }).join('');
    return`<tr><td class="td-date">${d.date}</td>${cells}</tr>`;
  }).join('');
  const maxF=Math.max(...Object.values(allFreq),1);
  const heatmapCells=[...Array(10)].map((_,d)=>{
    const f=allFreq[d]||0;
    const bg=f>=4?'rgba(239,68,68,.85)':f===3?'rgba(245,158,11,.7)':f===2?'rgba(16,185,129,.55)':f===1?'rgba(99,102,241,.45)':'rgba(107,114,128,.2)';
    const tc=f>0?'#fff':'var(--muted)';
    return`<div class="hm-cell" style="background:${bg};color:${tc};"><div>${d}</div><div class="hm-label">${f}×</div></div>`;
  }).join('');
  const posStats=['AS','KOP','KEP','EK'].map(pos=>{
    const sorted=Object.entries(freq[pos]).sort((a,b)=>b[1]-a[1]);
    const top=sorted.slice(0,3).map(([d,f])=>`<div class="pos-chip"><span class="pos-chip-num">${d}</span><span class="pos-chip-freq">${f}×</span></div>`).join('');
    return`<div class="pos-stat-box"><div class="pos-stat-title">${pos}</div><div class="pos-top">${top}</div></div>`;
  }).join('');

  document.getElementById('paitoResult').innerHTML=`
  <div class="card">
    <div class="card-title">Paito Warna (${data.length} data)</div>
    <div class="paito-wrap">
      <table class="paito-table">
        <thead><tr><th style="text-align:left;padding-left:8px;">Tanggal</th><th>AS</th><th>KOP</th><th>KEP</th><th>EK</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Heatmap Digit 0-9</div>
    <div class="heatmap-grid">${heatmapCells}</div>
  </div>
  <div class="card">
    <div class="card-title">Top Angka Per Posisi</div>
    <div class="pos-stat-grid">${posStats}</div>
  </div>
  <div id="aiAnalyzeResult"></div>`;
}

async function aiAnalyze(){
  const data=parseInput();
  if(data.length<3){alert('Minimal 3 data result! Isi dulu lalu klik AI Analisa.');return;}
  if(!window._parsedData.length)generatePaito();
  const key=getGroqKey();
  if(!key){alert('⚠️ Set Groq API Key dulu di halaman utama (Settings)!');return;}
  if(!document.getElementById('paitoResult').innerHTML)generatePaito();

  let resultBox=document.getElementById('aiAnalyzeResult');
  if(!resultBox){resultBox=document.createElement('div');resultBox.id='aiAnalyzeResult';document.getElementById('paitoResult').appendChild(resultBox);}
  resultBox.innerHTML=`<div class="card" style="text-align:center;padding:28px;">
    <div style="font-size:32px;margin-bottom:10px;" class="spin">🤖</div>
    <div style="font-weight:800;color:#2dd4bf;font-size:15px;">Bot AI sedang analisa paito...</div>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>`;

  const pasaran=document.getElementById('pasaran').options[document.getElementById('pasaran').selectedIndex]?.text||'Unknown';
  const results=data.map(d=>d.angka).join(', ');
  try{
    const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:800,temperature:0.3,
        messages:[{role:'user',content:`Analisa paito warna togel ${pasaran} dari data LALU (sudah keluar): ${results}\nPENTING: angka_akan_muncul adalah angka BERIKUTNYA yang BELUM keluar. JANGAN masukkan angka dari data lalu. Format angka_akan_muncul: TEPAT 4 digit baru, BUKAN format xxxx-yyyy.\nJawab HANYA JSON valid:\n{"pola_terdeteksi":["3 pola"],"angka_akan_muncul":["4 digit"],"angka_overdraft":["2 digit"],"trend":"naik/turun/stabil","rekomendasi_2d":"2d","rekomendasi_kepala":"1d","rekomendasi_ekor":"1d","analisa":"2-3 kalimat","tips":"1 tips praktis"}`}]})
    });
    const json=await resp.json();
    if(!resp.ok)throw new Error(json.error?.message||'API Error');
    const p=JSON.parse(json.choices[0].message.content.trim().replace(/```json|```/g,'').trim());
    // Sanitasi: bersihkan format "xxxx-yyyy" dari field prediksi
    if(p.rekomendasi_2d&&p.rekomendasi_2d.includes('-'))p.rekomendasi_2d=p.rekomendasi_2d.split('-').pop().trim();
    if(Array.isArray(p.angka_akan_muncul))p.angka_akan_muncul=p.angka_akan_muncul.map(a=>a.includes('-')?a.split('-').pop().trim():a);
    resultBox.innerHTML=`<div class="card">
      <div class="ai-box">
        <div class="ai-box-title">🤖 Bot AI Analisa Paito — ${pasaran}</div>
        <div style="margin-bottom:12px;">
          <div style="font-size:10px;color:var(--muted);font-weight:800;letter-spacing:.5px;margin-bottom:6px;">POLA TERDETEKSI</div>
          <div class="ai-tag-row">${(p.pola_terdeteksi||[]).map(pl=>`<span class="ai-tag ai-tag-teal">${pl}</span>`).join('')}</div>
        </div>
        <div class="divider"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
          <div style="background:var(--bg3);border-radius:10px;padding:12px;text-align:center;">
            <div style="font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:800;">REKOMENDASI 2D</div>
            <div class="rekomendasi-big">${p.rekomendasi_2d||'--'}</div>
          </div>
          <div style="background:var(--bg3);border-radius:10px;padding:12px;text-align:center;">
            <div style="font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:800;">TREND</div>
            <div style="font-family:'Bebas Neue';font-size:22px;color:#2dd4bf;">${(p.trend||'stabil').toUpperCase()}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px;">KEP: ${p.rekomendasi_kepala||'-'} · EK: ${p.rekomendasi_ekor||'-'}</div>
          </div>
        </div>
        <div style="display:flex;gap:14px;margin-bottom:12px;">
          <div style="flex:1;">
            <div style="font-size:10px;color:var(--muted);font-weight:800;margin-bottom:6px;">🔮 AKAN MUNCUL</div>
            <div style="display:flex;gap:5px;">${(p.angka_akan_muncul||[]).map(n=>`<div style="width:32px;height:32px;background:rgba(16,185,129,.2);border:1.5px solid rgba(16,185,129,.4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:16px;color:var(--green);">${n}</div>`).join('')}</div>
          </div>
          <div style="flex:1;">
            <div style="font-size:10px;color:var(--muted);font-weight:800;margin-bottom:6px;">⚠️ OVERDRAFT</div>
            <div style="display:flex;gap:5px;">${(p.angka_overdraft||[]).map(n=>`<div style="width:32px;height:32px;background:rgba(220,38,38,.15);border:1.5px solid rgba(220,38,38,.35);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:16px;color:#f87171;">${n}</div>`).join('')}</div>
          </div>
        </div>
        <div class="divider"></div>
        <div style="font-size:13px;color:var(--text);line-height:1.75;margin-bottom:10px;">${p.analisa||''}</div>
        <div style="background:rgba(245,158,11,.07);border-radius:8px;padding:10px;font-size:12px;color:var(--gold);">💡 ${p.tips||''}</div>
      </div>
    </div>`;
  }catch(e){
    resultBox.innerHTML=`<div class="card" style="text-align:center;padding:20px;color:#f87171;">⚠️ AI Error: ${e.message}</div>`;
  }
}

// ── WBData + History auto-load ────────────────────────────────
let _wbDataReady=false;

function buildPasaranDropdown(){
  const sel=document.getElementById('pasaran');
  sel.innerHTML='';
  (WBData.MARKETS||[]).forEach(m=>{
    const entry=WBData.get(m.id);
    const hLen=(entry&&entry.history)?entry.history.length:0;
    const o=document.createElement('option');
    o.value=m.id;
    o.textContent=`${m.flag} ${m.name} (${m.short})${hLen?' · '+hLen+'d':''}`;
    sel.appendChild(o);
  });
  sel.value='hk';
  _wbDataReady=true;
  document.getElementById('btnAutoFill').disabled=false;
  onPasaranChange();
}

function onPasaranChange(){
  const id=document.getElementById('pasaran').value;
  const hint=document.getElementById('resultHint');
  const hLabel=document.getElementById('historyCountLabel');
  if(!id||!_wbDataReady){hint.textContent='';hLabel.textContent='';return;}

  const entry=WBData.get(id);
  const r=WBData.getResult(id);
  const history=(entry&&entry.history)||[];
  hLabel.textContent=history.length?`(${history.length} hari tersimpan)`:'';

  if(r&&r!=='----'){
    const tgl=entry&&entry.tgl?' · '+entry.tgl:'';
    hint.textContent=`📡 Result: ${r}${tgl}`;
  } else if(history.length){
    hint.textContent=`⏳ Belum keluar · pakai ${history.length} data history`;
  } else {
    hint.textContent='⏳ Belum tersedia';
  }

  // ── Auto-muat history ke textarea & generate paito ──
  autoFillFromHistory();
}

/** Isi textarea dari history result.json, lalu langsung buat paito */
function autoFillFromHistory(){
  const id=document.getElementById('pasaran').value;if(!id)return;
  const entry=WBData.get(id);if(!entry)return;

  let history=(entry.history||[]).slice(0,30);

  // Seed dari result hari ini kalau history masih kosong
  if(!history.length&&entry.result&&/^\d{4}$/.test(entry.result)){
    const today=new Date().toISOString().slice(0,10);
    history=[{date:today,result:entry.result}];
  }
  if(!history.length)return;

  // Format: "YYYY-MM-DD 1234" per baris, terbaru di atas
  const lines=history.map(h=>`${h.date} ${h.result}`).join('\n');
  document.getElementById('dataInput').value=lines;

  // Auto-generate paito kalau cukup data
  if(history.length>=3)generatePaito();
}

/** Tombol "+ Hari Ini" — prepend result terbaru ke textarea */
function addTerkini(){
  const id=document.getElementById('pasaran').value;if(!id)return;
  const r=WBData.getResult(id);const entry=WBData.get(id);
  if(!r||r==='----'){alert('⚠️ Result hari ini belum tersedia.');return;}

  let dateStr=new Date().toISOString().slice(0,10);
  const tgl=entry&&entry.tgl?entry.tgl:'';
  if(tgl&&/^\d{2}\/\d{2}$/.test(tgl)){
    const[dd,mm]=tgl.split('/');
    dateStr=`${new Date().getFullYear()}-${mm}-${dd}`;
  }
  const newLine=`${dateStr} ${r}`;
  const cur=document.getElementById('dataInput').value.trim();
  if(cur.split('\n')[0]===newLine){alert(`Result ${r} sudah di baris pertama!`);return;}
  document.getElementById('dataInput').value=newLine+(cur?'\n'+cur:'');
  generatePaito();
}

async function initWBData(){
  const st=document.getElementById('dataStatus');
  if(WBData.MARKETS&&WBData.MARKETS.length)buildPasaranDropdown();
  if(!WBData.isFresh()){st.textContent='⏳';await WBData.refresh();st.textContent='';}
  else{st.textContent='✅';setTimeout(()=>{st.textContent='';},2000);}
  if(!_wbDataReady)buildPasaranDropdown();
  onPasaranChange();
  WBData.onUpdate(()=>onPasaranChange());
}
initWBData();
</script>
