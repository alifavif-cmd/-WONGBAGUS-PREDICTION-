<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rumus Otomatis 2026 — WONGBAGUS PREDICTION</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#f59e0b;--gold-light:#fcd34d;--gold-dark:#b45309;--bg:#07070e;--bg2:#0f0f1a;--bg3:#15152a;--card:#111128;--border:rgba(245,158,11,0.15);--text:#e2e2f0;--muted:#6b6b8a;--green:#10b981;--red:#dc2626;--orange:#f97316;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(249,115,22,.05) 0%,transparent 70%);pointer-events:none;}

.topbar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(7,7,14,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:99;}
.topbar-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--red));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:16px;color:#000;text-decoration:none;flex-shrink:0;}
.topbar-info{flex:1;}
.topbar-title{font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;background:linear-gradient(90deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.topbar-sub{font-size:10px;color:var(--muted);font-weight:600;}
.topbar-back{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-family:'Nunito';font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s;flex-shrink:0;}
.topbar-back:hover{border-color:var(--gold);color:var(--gold);}

.container{max-width:640px;margin:0 auto;padding:16px;position:relative;z-index:1;}
.page-hero{text-align:center;padding:20px 0 6px;}
.page-hero-icon{font-size:36px;margin-bottom:8px;}
.page-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;color:var(--orange);line-height:1;}
.page-sub{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.6;}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.card-title::before{content:'';display:block;width:3px;height:14px;background:var(--orange);border-radius:2px;}

label{font-size:11px;color:var(--muted);font-weight:800;display:block;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
select,input{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Nunito';font-size:14px;font-weight:600;width:100%;outline:none;margin-bottom:12px;transition:border-color .2s;}
select:focus,input:focus{border-color:var(--orange);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-row > div select, .form-row > div input{margin-bottom:0;}

.label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.label-row label{margin-bottom:0;}
.result-hint{font-size:11px;color:var(--green);font-weight:700;min-height:18px;margin:-8px 0 10px;}

.btn-autofill{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:var(--green);border-radius:8px;padding:5px 12px;font-family:'Nunito';font-size:12px;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap;}
.btn-autofill:hover{background:rgba(16,185,129,.25);}
.btn-autofill:disabled{opacity:.4;cursor:not-allowed;}

.multi-result-row{display:flex;gap:8px;margin-bottom:12px;}
.multi-result-row input{margin-bottom:0;font-family:'Bebas Neue';font-size:20px;letter-spacing:4px;text-align:center;color:var(--gold);}

.btn{padding:12px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Nunito';font-size:14px;font-weight:800;transition:.2s;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-orange{background:linear-gradient(135deg,#f97316,#c2410c);color:#fff;box-shadow:0 4px 16px rgba(249,115,22,.25);}
.btn-orange:hover{opacity:.9;transform:translateY(-1px);}
.btn-orange:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}

/* PROCESS STEPS */
.steps-row{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:16px;flex-wrap:wrap;}
.step{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;}
.step-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.step-active .step-dot{background:var(--orange);color:#fff;}
.step-done .step-dot{background:var(--green);color:#fff;}
.step-pending .step-dot{background:var(--bg3);color:var(--muted);border:1px solid var(--border);}
.step-active .step-label{color:var(--orange);}
.step-done .step-label{color:var(--green);}
.step-pending .step-label{color:var(--muted);}
.step-line{width:20px;height:1px;background:var(--border);}

/* RESULT CARD */
.result-main{background:linear-gradient(135deg,rgba(249,115,22,.15),rgba(194,65,12,.08));border:1px solid rgba(249,115,22,.3);border-radius:14px;padding:18px;text-align:center;margin-bottom:14px;}
.result-main-lbl{font-size:10px;font-weight:800;color:#fb923c;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.result-main-4d{font-family:'Bebas Neue';font-size:58px;letter-spacing:10px;color:#fff;line-height:1;text-shadow:0 0 30px rgba(249,115,22,.4);}
.result-main-sub{display:flex;justify-content:center;gap:20px;margin-top:10px;}
.result-main-sub-item{text-align:center;}
.result-main-sub-lbl{font-size:9px;color:var(--muted);font-weight:800;letter-spacing:.5px;}
.result-main-sub-val{font-family:'Bebas Neue';font-size:24px;color:var(--orange);}

/* DETAIL BOX */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.detail-box{background:var(--bg3);border-radius:10px;padding:12px;text-align:center;}
.detail-lbl{font-size:9px;color:var(--muted);font-weight:800;letter-spacing:.5px;margin-bottom:4px;}
.detail-val{font-family:'Bebas Neue';font-size:28px;color:var(--gold);}
.detail-val.sm{font-size:20px;}

/* ANGKA ROW */
.angka-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
.angka-chip{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:18px;font-weight:700;}
.ac-gold{background:rgba(245,158,11,.18);border:1.5px solid rgba(245,158,11,.4);color:var(--gold);}
.ac-orange{background:rgba(249,115,22,.15);border:1.5px solid rgba(249,115,22,.35);color:#fb923c;}
.ac-green{background:rgba(16,185,129,.15);border:1.5px solid rgba(16,185,129,.35);color:#34d399;}
.ac-red{background:rgba(220,38,38,.15);border:1.5px solid rgba(220,38,38,.35);color:#f87171;}

/* RUMUS LIST */
.rumus-list{display:flex;flex-direction:column;gap:8px;}
.rumus-row{background:var(--bg3);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;}
.rumus-idx{width:24px;height:24px;border-radius:6px;background:rgba(249,115,22,.2);border:1px solid rgba(249,115,22,.4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fb923c;flex-shrink:0;}
.rumus-info{flex:1;}
.rumus-name{font-size:12px;font-weight:700;color:var(--text);}
.rumus-formula{font-size:10px;color:var(--muted);margin-top:2px;font-family:'Courier New',monospace;}
.rumus-pred{font-family:'Bebas Neue';font-size:26px;letter-spacing:3px;color:var(--orange);flex-shrink:0;}

/* AI BOX */
.ai-box{background:linear-gradient(135deg,rgba(249,115,22,.08),rgba(194,65,12,.04));border:1px solid rgba(249,115,22,.25);border-radius:12px;padding:14px;margin-top:10px;}
.ai-title{font-size:11px;font-weight:800;color:#fb923c;margin-bottom:8px;letter-spacing:.5px;}
.ai-text{font-size:13px;color:var(--text);line-height:1.75;}

/* LOADING */
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.spin{animation:spin .8s linear infinite;}
.loading-dots{display:flex;justify-content:center;gap:5px;margin-top:10px;}
.loading-dots span{width:6px;height:6px;background:var(--orange);border-radius:50%;animation:pulse .8s ease-in-out infinite;}
.loading-dots span:nth-child(2){animation-delay:.15s;}
.loading-dots span:nth-child(3){animation-delay:.3s;}

.divider{height:1px;background:var(--border);margin:12px 0;}
footer{text-align:center;padding:24px 16px;border-top:1px solid var(--border);margin-top:20px;color:var(--muted);font-size:11px;}
footer a{color:var(--gold);text-decoration:none;}
</style>
<script src="./wb_data.js" onerror="var s=document.createElement('script');s.src='https://alifavif-cmd.github.io/-WONGBAGUS-PREDICTION-/wb_data.js';document.head.appendChild(s);"></script>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-logo">WB</a>
  <div class="topbar-info">
    <div class="topbar-title">WONGBAGUS PREDICTION</div>
    <div class="topbar-sub">RUMUS OTOMATIS 2026 · SEKALI KLIK</div>
  </div>
  <a href="index.html" class="topbar-back">← Beranda</a>
</div>

<div class="container">
  <div class="page-hero">
    <div class="page-hero-icon">⚡</div>
    <div class="page-title">Rumus Otomatis</div>
    <p class="page-sub">Scan angka otomatis · AI prediksi instant · Sekali klik JP</p>
  </div>

  <!-- PROCESS STEPS -->
  <div class="steps-row">
    <div class="step step-active">
      <div class="step-dot">1</div>
      <span class="step-label">Pilih Pasaran</span>
    </div>
    <div class="step-line"></div>
    <div class="step step-pending" id="step2">
      <div class="step-dot">2</div>
      <span class="step-label">Input Result</span>
    </div>
    <div class="step-line"></div>
    <div class="step step-pending" id="step3">
      <div class="step-dot">3</div>
      <span class="step-label">Scan AI</span>
    </div>
    <div class="step-line"></div>
    <div class="step step-pending" id="step4">
      <div class="step-dot">4</div>
      <span class="step-label">Prediksi</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">⚙️ Konfigurasi Scan Otomatis</div>

    <label>Pasaran <span id="dataStatus" style="text-transform:none;font-size:10px;color:var(--muted);font-weight:600;"></span></label>
    <select id="pasaran" onchange="onPasaranChange()">
      <option value="">⏳ Memuat 65 pasaran...</option>
    </select>
    <div class="result-hint" id="resultHint"></div>

    <label>3 Result Terakhir <span style="color:var(--muted);text-transform:none;font-weight:600;">(R1=terbaru)</span></label>
    <div class="multi-result-row">
      <input type="text" id="r1" placeholder="R1" maxlength="4" oninput="this.value=this.value.replace(/[^0-9]/g,'');checkStep2()">
      <input type="text" id="r2" placeholder="R2" maxlength="4" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      <input type="text" id="r3" placeholder="R3" maxlength="4" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    </div>
    <button class="btn-autofill" id="btnAutoFill" onclick="autoFillResult()" disabled style="width:100%;margin-bottom:12px;padding:8px;">📡 Isi Otomatis dari Data Terkini</button>

    <div class="form-row">
      <div>
        <label>Target</label>
        <select id="target">
          <option value="2D" selected>2D</option>
          <option value="3D">3D</option>
          <option value="4D">4D</option>
          <option value="KEPALA">Kepala</option>
          <option value="EKOR">Ekor</option>
        </select>
      </div>
      <div>
        <label>Mode Scan</label>
        <select id="mode">
          <option value="auto">⚡ Otomatis</option>
          <option value="manual">✏️ Manual</option>
          <option value="ai" selected>🤖 AI Full</option>
        </select>
      </div>
    </div>

    <button class="btn btn-orange" id="btnScan" onclick="jalankanScan()">⚡ Scan Otomatis Sekarang</button>
  </div>

  <div id="scanResult"></div>
</div>

<footer>
  <strong>WONGBAGUS PREDICTION</strong> · Rumus Otomatis 2026<br>
  <a href="index.html">← Kembali ke Beranda</a>
</footer>

<script>
function getGroqKey(){return localStorage.getItem('wb_groq_key')||'';}
function checkStep2(){
  const v=document.getElementById('r1').value;
  const s2=document.getElementById('step2');
  if(v.length===4){s2.className='step step-done';}else{s2.className='step step-active';}
}

// RUMUS OTOMATIS LOKAL (tanpa AI)
function hitungLokal(r1,r2,r3){
  const d=(s,i)=>parseInt(s[i]||0);
  const as1=d(r1,0),kop1=d(r1,1),kep1=d(r1,2),ek1=d(r1,3);
  const as2=d(r2,0),kop2=d(r2,1),kep2=d(r2,2),ek2=d(r2,3);
  const as3=d(r3,0),kop3=d(r3,1),kep3=d(r3,2),ek3=d(r3,3);

  const fmt2=(n)=>`${Math.abs(n)%100}`.padStart(2,'0');
  const mod=(n,m=10)=>((n%m)+m)%m;

  return[
    {nama:'A1 — Jum Kep+Ek',formula:`(${kep1}+${ek1})%10 · (${as1}+${kop1})%10`,pred:fmt2(mod(kep1+ek1)*10+mod(as1+kop1))},
    {nama:'A2 — Selisih Beda',formula:`|${kep1}-${ek2}| · |${as1}-${kop2}|`,pred:fmt2(Math.abs(kep1-ek2)*10+Math.abs(as1-kop2))},
    {nama:'A3 — Cross R1R2',formula:`(${ek1}+${as2})%10 · (${kop1}+${ek2})%10`,pred:fmt2(mod(ek1+as2)*10+mod(kop1+ek2))},
    {nama:'A4 — Diagonal',formula:`(${as1}+${kep2}+${ek3})%10 · (${ek1}+${kop2}+${as3})%10`,pred:fmt2(mod(as1+kep2+ek3)*10+mod(ek1+kop2+as3))},
    {nama:'A5 — Mistik Jum',formula:`(${as1}×${ek1}+${as2})%100`,pred:fmt2(mod(as1*ek1+as2,100))},
    {nama:'A6 — Balik+Turun',formula:`${ek1}${kep1} → +1 masing`,pred:`${mod(ek1+1)}${mod(kep1+1)}`},
    {nama:'A7 — R2 Lompat',formula:`(${kep2}+2)%10 · (${ek2}+2)%10`,pred:`${mod(kep2+2)}${mod(ek2+2)}`},
    {nama:'A8 — Tiga Step',formula:`(${as1}+${as2}+${as3})%10 · (${ek1}+${ek2}+${ek3})%10`,pred:`${mod(as1+as2+as3)}${mod(ek1+ek2+ek3)}`},
    {nama:'A9 — Silang 3R',formula:`(${kop1}+${kep2}+${ek3})%10 · (${as1}+${kop3})%10`,pred:`${mod(kop1+kep2+ek3)}${mod(as1+kop3)}`},
    {nama:'A10 — Mirror',formula:`Balik ${r1.slice(-2)} = ${r1.slice(-2).split('').reverse().join('')}`,pred:r1.slice(-2).split('').reverse().join('')},
  ];
}

async function jalankanScan(){
  const r1=document.getElementById('r1').value.trim();
  const r2=document.getElementById('r2').value.trim()||'0000';
  const r3=document.getElementById('r3').value.trim()||'0000';
  if(r1.length!==4||isNaN(r1)){alert('Masukkan minimal R1 (4 digit)!');return;}

  const mode=document.getElementById('mode').value;
  const target=document.getElementById('target').value;
  const pasaranName=document.getElementById('pasaran').options[document.getElementById('pasaran').selectedIndex]?.text||'Unknown';

  // Update steps
  document.getElementById('step2').className='step step-done';
  document.getElementById('step3').className='step step-active';
  document.getElementById('step4').className='step step-pending';

  const el=document.getElementById('scanResult');
  el.innerHTML=`<div class="card" style="text-align:center;padding:28px;">
    <div style="font-size:32px;" class="spin">⚡</div>
    <div style="font-weight:800;color:#fb923c;font-size:15px;margin-top:12px;">Scanning otomatis...</div>
    <div style="font-size:12px;color:var(--muted);margin-top:4px;">Memproses ${mode==='ai'?'AI Groq':'rumus lokal'} untuk ${pasaranName}</div>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>`;
  document.getElementById('btnScan').disabled=true;

  const lokalResult=hitungLokal(r1,r2,r3);

  // Frekuensi prediksi lokal
  const freqMap={};
  lokalResult.forEach(r=>{freqMap[r.pred]=(freqMap[r.pred]||0)+1;});
  const topPred=Object.entries(freqMap).sort((a,b)=>b[1]-a[1]);
  const best2d=topPred[0]?.[0]||'--';
  const best_kep=best2d[0]||'-';
  const best_ek=best2d[1]||'-';

  let aiData=null;
  const key=getGroqKey();
  if(mode==='ai'&&key){
    try{
      const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
        body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:600,temperature:0.35,
          messages:[{role:'user',content:`Scan otomatis togel ${pasaranName} dari result: R1=${r1}, R2=${r2}, R3=${r3}. Target: ${target}.\nJawab HANYA JSON: {"prediksi_utama":"2d","prediksi_4d":"4d","kepala":"1d","ekor":"1d","bbfs":["5 digit"],"mati":["2 digit"],"analisa":"2 kalimat singkat","keyakinan":"Tinggi/Sedang/Rendah"}`}]})
      });
      const json=await resp.json();
      if(resp.ok){aiData=JSON.parse(json.choices[0].message.content.trim().replace(/```json|```/g,'').trim());}
    }catch(e){console.log('AI error:',e.message);}
  }

  document.getElementById('step3').className='step step-done';
  document.getElementById('step4').className='step step-done';

  const keyLabel=aiData?.keyakinan==='Tinggi'?'<span style="background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#34d399;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:800;">✅ Keyakinan Tinggi</span>':
    aiData?.keyakinan==='Sedang'?'<span style="background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:var(--gold);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:800;">⚡ Keyakinan Sedang</span>':
    '<span style="background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);color:#f87171;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:800;">⚠️ Keyakinan Rendah</span>';

  const predUtama=aiData?.prediksi_utama||best2d;
  const pred4d=aiData?.prediksi_4d||`${r1[0]}${predUtama}${r1[3]}`;
  const kepala=aiData?.kepala||best_kep;
  const ekor=aiData?.ekor||best_ek;

  el.innerHTML=`
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div>
        <div style="font-family:'Bebas Neue';font-size:15px;color:var(--gold-light);">${pasaranName}</div>
        <div style="font-size:10px;color:var(--muted);">R1: ${r1} · R2: ${r2} · R3: ${r3}</div>
      </div>
      ${aiData?keyLabel:'<span style="background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3);color:#60a5fa;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:800;">⚡ Lokal</span>'}
    </div>

    <div class="result-main">
      <div class="result-main-lbl">⚡ Prediksi Utama — ${target}</div>
      <div class="result-main-4d">${pred4d}</div>
      <div class="result-main-sub">
        <div class="result-main-sub-item"><div class="result-main-sub-lbl">2D</div><div class="result-main-sub-val">${predUtama}</div></div>
        <div class="result-main-sub-item"><div class="result-main-sub-lbl">Kepala</div><div class="result-main-sub-val">${kepala}</div></div>
        <div class="result-main-sub-item"><div class="result-main-sub-lbl">Ekor</div><div class="result-main-sub-val">${ekor}</div></div>
      </div>
    </div>

    ${aiData&&aiData.bbfs?`
    <div style="margin-bottom:14px;">
      <div style="font-size:10px;color:var(--muted);font-weight:800;letter-spacing:.5px;margin-bottom:6px;">🎲 BBFS AI</div>
      <div class="angka-row">${(aiData.bbfs||[]).map(n=>`<div class="angka-chip ac-orange">${n}</div>`).join('')}</div>
    </div>
    <div style="margin-bottom:14px;">
      <div style="font-size:10px;color:var(--muted);font-weight:800;letter-spacing:.5px;margin-bottom:6px;">💀 ANGKA MATI</div>
      <div class="angka-row">${(aiData.mati||[]).map(n=>`<div class="angka-chip ac-red">${n}</div>`).join('')}</div>
    </div>
    <div class="divider"></div>`:''}

    <div style="font-size:10px;color:var(--muted);font-weight:800;letter-spacing:.5px;margin-bottom:10px;">📊 HASIL 10 RUMUS OTOMATIS</div>
    <div class="rumus-list">
      ${lokalResult.map((r,i)=>`
      <div class="rumus-row">
        <div class="rumus-idx">${i+1}</div>
        <div class="rumus-info">
          <div class="rumus-name">${r.nama}</div>
          <div class="rumus-formula">${r.formula}</div>
        </div>
        <div class="rumus-pred">${r.pred}</div>
      </div>`).join('')}
    </div>

    <div class="divider"></div>
    <div style="font-size:10px;color:var(--muted);font-weight:800;letter-spacing:.5px;margin-bottom:8px;">📈 ANGKA PALING SERING KELUAR</div>
    <div class="angka-row">
      ${topPred.slice(0,5).map(([n,f],i)=>`
      <div style="background:${i===0?'rgba(249,115,22,.2)':'rgba(255,255,255,.05)'};border:1.5px solid ${i===0?'rgba(249,115,22,.4)':'rgba(255,255,255,.08)'};border-radius:8px;padding:6px 10px;text-align:center;">
        <div style="font-family:'Bebas Neue';font-size:20px;color:${i===0?'#fb923c':'var(--muted)'};">${n}</div>
        <div style="font-size:9px;color:var(--muted);font-weight:700;">${f}×</div>
      </div>`).join('')}
    </div>

    ${aiData&&aiData.analisa?`
    <div class="ai-box">
      <div class="ai-title">🤖 Analisa AI — ${pasaranName}</div>
      <div class="ai-text">${aiData.analisa}</div>
    </div>`:''}

    <div class="divider"></div>
    <button class="btn btn-outline" onclick="copyHasil()" style="font-size:12px;">📋 Copy Hasil Scan</button>
  </div>`;

  window._otomatisData={r1,r2,r3,predUtama,pred4d,kepala,ekor,lokalResult,topPred,aiData,pasaranName};
  document.getElementById('btnScan').disabled=false;
}

function copyHasil(){
  const d=window._otomatisData;if(!d)return;
  const txt=[
    '⚡ WONGBAGUS PREDICTION — Rumus Otomatis',
    `Pasaran : ${d.pasaranName}`,
    `Result  : R1=${d.r1} R2=${d.r2} R3=${d.r3}`,
    '━━━━━━━━━━━━━━━━━━━━━━━',
    `Prediksi Utama : ${d.predUtama}`,
    `Prediksi 4D    : ${d.pred4d}`,
    `Kepala / Ekor  : ${d.kepala} / ${d.ekor}`,
    '━━━━━━━━━━━━━━━━━━━━━━━',
    ...d.lokalResult.map((r,i)=>`R${i+1} ${r.nama}: ${r.pred}`),
    '━━━━━━━━━━━━━━━━━━━━━━━',
    `Top 2D: ${d.topPred.slice(0,3).map(([n,f])=>`${n}(${f}×)`).join(' · ')}`,
    d.aiData?`🧠 AI: ${d.aiData.analisa}`:'',
    '━━━━━━━━━━━━━━━━━━━━━━━',
    '🌐 WONGBAGUS PREDICTION'
  ].filter(Boolean).join('\n');
  navigator.clipboard.writeText(txt).then(()=>alert('✅ Tersalin!')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('✅ Tersalin!');
  });
}

// WBData
let _wbDataReady=false;
function buildPasaranDropdown(){
  const sel=document.getElementById('pasaran');sel.innerHTML='';
  (WBData.MARKETS||[]).forEach(m=>{const o=document.createElement('option');o.value=m.id;o.textContent=`${m.flag} ${m.name} (${m.short})`;sel.appendChild(o);});
  sel.value='hk';_wbDataReady=true;document.getElementById('btnAutoFill').disabled=false;onPasaranChange();
}
function onPasaranChange(){
  const id=document.getElementById('pasaran').value;const hint=document.getElementById('resultHint');
  if(!id||!_wbDataReady){hint.textContent='';return;}
  const r=WBData.getResult(id);const entry=WBData.get(id);
  if(r&&r!=='----'){const tgl=entry&&entry.tgl?' · '+entry.tgl:'';hint.textContent=`📡 Result terkini: ${r}${tgl}`;}
  else{hint.textContent='⏳ Result belum tersedia';}
}
function autoFillResult(){
  const id=document.getElementById('pasaran').value;if(!id)return;
  const r=WBData.getResult(id);
  if(r&&r!=='----'){
    const r1cur=document.getElementById('r1').value;
    const r2cur=document.getElementById('r2').value;
    if(!r1cur){document.getElementById('r1').value=r;}
    else if(!r2cur&&r1cur!==r){document.getElementById('r2').value=r1cur;document.getElementById('r1').value=r;}
    else{document.getElementById('r3').value=document.getElementById('r2').value;document.getElementById('r2').value=r1cur;document.getElementById('r1').value=r;}
    checkStep2();
  }else{alert('⚠️ Result belum tersedia.');}
}
async function initWBData(){
  const st=document.getElementById('dataStatus');
  if(WBData.MARKETS&&WBData.MARKETS.length)buildPasaranDropdown();
  if(!WBData.isFresh()){st.textContent='⏳';await WBData.refresh();st.textContent='';}
  else{st.textContent='✅';setTimeout(()=>{st.textContent='';},2000);}
  if(!_wbDataReady)buildPasaranDropdown();
  onPasaranChange();WBData.onUpdate(()=>onPasaranChange());
}
initWBData();
</script>
</body></html>
