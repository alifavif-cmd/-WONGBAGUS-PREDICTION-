<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rekap 2D — WONGBAGUS PREDICTION</title>
  <script src="./wb_data.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--gold:#f59e0b;--bg:#07070e;--bg2:#0f0f1a;--card:#111128;--border:rgba(245,158,11,.15);--text:#e2e2f0;--muted:#6b6b8a;--green:#10b981;--red:#dc2626;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    header{background:rgba(7,7,14,.95);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:99;}
    .logo{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),var(--red));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:17px;color:#fff;flex-shrink:0;}
    .htitle{font-family:'Bebas Neue';font-size:18px;letter-spacing:1.5px;color:var(--gold);}
    .back{margin-left:auto;background:rgba(245,158,11,.1);border:1px solid var(--border);border-radius:50px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--gold);text-decoration:none;}
    .wrap{max-width:900px;margin:0 auto;padding:16px 12px 40px;}
    .status-bar{font-size:11px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
    .dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:blink 1.5s infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
    .sec{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:20px;}
    .sec-hdr{background:rgba(245,158,11,.06);border-bottom:1px solid var(--border);padding:10px 16px;font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;color:var(--gold);}
    table{width:100%;border-collapse:collapse;}
    thead th{padding:8px 12px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);background:rgba(245,158,11,.04);border-bottom:1px solid var(--border);text-align:center;}
    thead th:first-child{text-align:left;}
    tbody tr{border-bottom:1px solid rgba(255,255,255,.04);}
    tbody tr:last-child{border:none;}
    tbody td{padding:8px 12px;font-size:13px;text-align:center;}
    tbody td:first-child{text-align:left;}
    .mkt-name{display:flex;align-items:center;gap:6px;}
    .res{font-family:'Bebas Neue';font-size:20px;letter-spacing:2px;color:var(--gold);}
    .belum{color:var(--muted);font-size:14px;}
    .d-as{font-family:'Bebas Neue';font-size:18px;color:#a78bfa;}
    .d-kop{font-family:'Bebas Neue';font-size:18px;color:#34d399;}
    .d-kep{font-family:'Bebas Neue';font-size:18px;color:#60a5fa;}
    .d-ek{font-family:'Bebas Neue';font-size:18px;color:#f87171;}
    input.search{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:50px;padding:9px 16px 9px 38px;color:var(--text);font-family:'Nunito';font-size:13px;outline:none;margin-bottom:12px;}
    .search-wrap{position:relative;}
    .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);}
    .upd{font-size:10px;color:var(--muted);}
  </style>
</head>
<body>
<header>
  <div class="logo">WB</div>
  <div class="htitle">Rekap 2D</div>
  <a class="back" href="./index.html">← Kembali</a>
</header>
<div class="wrap">
  <div class="status-bar" id="statusBar"><span class="dot"></span> Memuat data...</div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search" id="searchInput" placeholder="Cari pasaran... (HK, SGP, SDY...)" oninput="filterTable()">
  </div>
  <div class="sec">
    <div class="sec-hdr">📊 Rekap 2D Hari Ini</div>
    <table>
      <thead>
        <tr>
          <th>Pasaran</th>
          <th>AS</th><th>KOP</th><th>KEP</th><th>EK</th>
          <th>Result</th><th>Update</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" style="text-align:center;padding:20px;color:var(--muted)">⏳ Memuat dari result.json...</td></tr>
      </tbody>
    </table>
  </div>
</div>
<script>
function renderTable() {
  const all = WBData.getAll();
  if (!all) return;
  const meta = all._meta || {};
  const upd = meta.updated || '';
  const markets = WBData.MARKETS;
  let total = 0;
  const rows = markets.map(m => {
    const e = all[m.id] || {};
    const r = String(e.result || '----');
    const valid = /^\d{4}$/.test(r);
    if (valid) total++;
    const as  = valid ? r[0] : '-';
    const kop = valid ? r[1] : '-';
    const kep = valid ? r[2] : '-';
    const ek  = valid ? r[3] : '-';
    return `<tr data-name="${m.name.toLowerCase()} ${m.short.toLowerCase()} ${m.id}">
      <td><div class="mkt-name">${m.flag} <span>${m.name}</span></div></td>
      <td><span class="${valid?'d-as':'belum'}">${as}</span></td>
      <td><span class="${valid?'d-kop':'belum'}">${kop}</span></td>
      <td><span class="${valid?'d-kep':'belum'}">${kep}</span></td>
      <td><span class="${valid?'d-ek':'belum'}">${ek}</span></td>
      <td><span class="${valid?'res':'belum'}">${valid?r:'----'}</span></td>
      <td class="upd">${e.updated||upd||'—'}</td>
    </tr>`;
  }).join('');
  document.getElementById('tableBody').innerHTML = rows;
  document.getElementById('statusBar').innerHTML =
    '<span class="dot"></span> <strong>'+total+'</strong>/'+markets.length+
    ' pasaran · Last update: <strong>'+(upd||'—')+'</strong>';
}

// Tampil langsung dari cache, update otomatis kalau ada data baru
renderTable();
WBData.onUpdate(renderTable);

// Kalau cache kosong, fetch sendiri
if (!WBData.isFresh()) WBData.refresh().then(renderTable);

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('#tableBody tr').forEach(tr => {
    tr.style.display = (!q || (tr.dataset.name||'').includes(q)) ? '' : 'none';
  });
}
</script>
</body>
</html>
