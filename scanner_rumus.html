<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WB Scanner – Gabungan Rumus Otomatis</title>
<style>
  :root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--green:#238636;--red:#da3633;--cyan:#79c0ff;--yellow:#e3b341;--orange:#f0883e}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:13px;padding:8px}
  h1{color:var(--cyan);font-size:16px;margin-bottom:8px;text-align:center}
  .toolbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px}
  .toolbar label{color:var(--muted);font-size:11px;display:block;margin-bottom:2px}
  select,input{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 6px;font-size:12px;font-family:inherit}
  select:focus,input:focus{outline:none;border-color:var(--cyan)}
  .g{display:flex;flex-direction:column;gap:2px}
  button{cursor:pointer;border:none;border-radius:4px;padding:5px 12px;font-size:12px;font-family:inherit;font-weight:bold}
  .btn-scan{background:var(--green);color:#fff}
  .btn-scan:hover{background:#2ea043}
  .btn-scan:disabled{background:#1c4a20;color:#555;cursor:not-allowed}
  .btn-stop{background:var(--red);color:#fff}
  .btn-clear{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
  #status{font-size:11px;color:var(--yellow);margin:4px 0;min-height:16px}
  #progress{height:4px;background:var(--bg3);border-radius:2px;margin-bottom:6px}
  #progressBar{height:100%;background:var(--cyan);border-radius:2px;width:0;transition:width .15s}
  .trek-wrap{overflow-x:auto;margin-bottom:10px}
  table.trek{border-collapse:collapse;min-width:100%}
  table.trek th,table.trek td{border:1px solid var(--border);padding:3px 6px;text-align:center;white-space:nowrap;font-size:12px}
  table.trek th{background:var(--bg3);color:var(--muted)}
  table.trek td.hit-g{background:var(--green);color:#fff;font-weight:bold}
  table.trek td.hit-r{background:var(--red);color:#fff;font-weight:bold}
  table.trek td.sel-col{background:#1c2a3a}
  table.trek tr:nth-child(even) td{background:rgba(255,255,255,.02)}
  table.trek td.hit-g,table.trek td.hit-r{background:var(--green) !important}
  table.trek td.hit-r{background:var(--red) !important}
  #hasilBox{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px;margin-top:6px}
  #hasilBox h3{color:var(--cyan);font-size:13px;margin-bottom:6px}
  .rumus-row{display:flex;align-items:center;gap:6px;padding:5px 4px;border-bottom:1px solid var(--border);cursor:pointer}
  .rumus-row:hover{background:var(--bg3)}
  .rumus-row:last-child{border-bottom:none}
  .rumus-key{color:var(--cyan);font-weight:bold;min-width:200px;font-size:12px;flex:1}
  .rumus-score{background:var(--bg3);border-radius:10px;padding:1px 7px;font-size:11px;color:var(--yellow)}
  .rumus-ai{color:var(--orange);font-size:12px;font-weight:bold}
  .rumus-pred{color:#fff;font-size:14px;font-weight:bold}
  .trek-section{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px;margin-top:6px}
  .trek-meta{font-size:11px;color:var(--muted);margin-bottom:6px}
  .ai-result{font-size:16px;font-weight:bold;color:var(--cyan);margin-top:6px;padding:6px;background:var(--bg3);border-radius:4px;display:inline-block}
  .tabs{display:flex;gap:4px;margin-bottom:0}
  .tab{padding:5px 12px;border-radius:4px 4px 0 0;border:1px solid var(--border);border-bottom:none;cursor:pointer;font-size:12px;background:var(--bg3);color:var(--muted)}
  .tab.active{background:var(--bg2);color:var(--text);border-color:var(--cyan)}
  .tab-content{display:none;border:1px solid var(--border);border-top:none;border-radius:0 4px 4px 4px;padding:8px;background:var(--bg2)}
  .tab-content.active{display:block}
</style>
</head>
<body>
<h1>⚡ WB Scanner – Gabungan Rumus Otomatis</h1>

<div class="toolbar">
  <div class="g" style="flex:1;min-width:200px">
    <label>GitHub result.json URL</label>
    <input id="jsonUrl" type="text" style="width:100%" value="https://raw.githubusercontent.com/alifavif-cmd/-WONGBAGUS-PREDICTION-/main/result.json">
  </div>
  <div class="g">
    <label>Pasaran</label>
    <select id="selPasaran" style="min-width:160px"><option value="">-- Load dulu --</option></select>
  </div>
  <div class="g">
    <label>Hari Filter</label>
    <select id="selHari">
      <option value="">Semua hari</option>
      <option value="0">Minggu</option>
      <option value="1">Senin</option>
      <option value="2" selected>Selasa</option>
      <option value="3">Rabu</option>
      <option value="4">Kamis</option>
      <option value="5">Jumat</option>
      <option value="6">Sabtu</option>
    </select>
  </div>
  <div class="g">
    <label>Target</label>
    <select id="selTarget">
      <option value="2be" selected>2D Belakang (H+J)</option>
      <option value="2de">2D Depan (A+B)</option>
      <option value="ke">Ekor (J)</option>
      <option value="kk">Kepala (H)</option>
    </select>
  </div>
  <div class="g">
    <label>Putaran</label>
    <input id="inpPutaran" type="number" value="15" min="5" max="60" style="width:55px">
  </div>
  <div class="g">
    <label>Top N</label>
    <input id="inpTopN" type="number" value="10" min="1" max="30" style="width:50px">
  </div>
  <div class="g" style="flex-direction:row;align-items:flex-end;gap:4px">
    <button class="btn-clear" onclick="loadData()">📥 Load</button>
    <button id="btnScan" class="btn-scan" onclick="startScan()" disabled>🔍 Scan</button>
    <button id="btnStop" class="btn-stop" onclick="stopScan()" style="display:none">⏹ Stop</button>
  </div>
</div>

<div id="status">Masukkan URL result.json lalu klik Load.</div>
<div id="progress"><div id="progressBar"></div></div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('tabTrek')">📊 Trek</div>
  <div class="tab" onclick="switchTab('tabHasil')">🏆 Hasil Scan</div>
</div>

<div id="tabTrek" class="tab-content active"><div id="trekBox"><p style="color:var(--muted);font-size:12px;padding:8px">Load data dulu, lalu klik Scan.</p></div></div>
<div id="tabHasil" class="tab-content"><div id="hasilBox"><p style="color:var(--muted);font-size:12px">Belum ada hasil scan.</p></div></div>

<script>
// ============================================================
// TABEL MODIFIER (dari docs Scan Angka)
// Array index = digit 0-9 → nilai konversi
// ============================================================
const MOD_TABLE = {
  ix: [5,6,7,8,9,0,1,2,3,4],
  ty: [7,4,9,6,8,1,2,3,9,4],
  mb: [8,7,6,9,5,7,8,9,0,1],
  m0: [6,5,8,7,9,5,8,7,9,9],
  m1: [1,9,8,7,6,6,8,7,9,9],
  m2: [0,9,7,9,1,6,7,8,1,3],
  m3: [3,2,9,8,7,8,7,9,0,1],
  m4: [6,5,3,7,7,8,9,4,9,9],
  m5: [5,4,3,9,6,8,3,9,8,8],
  m6: [6,8,4,8,9,3,4,9,7,9],
  m7: [7,6,5,4,9,9,5,4,8,9],
  m8: [8,7,1,5,9,3,3,9,7,4],
  m9: [9,8,7,6,5,5,7,6,4,5],
};

function applyMod(digit, mod) {
  if (!mod || mod === '' || mod === '-') return digit;
  const t = MOD_TABLE[mod.toLowerCase()];
  return t ? (t[digit] ?? digit) : digit;
}

// ============================================================
// AMBIL DIGIT dari result 4D
// as=d[0], kop=d[1], kep=d[2], ekor=d[3]
// ============================================================
function getDigit(result4d, pos) {
  const d = result4d.split('').map(Number);
  const map = {as:0, kop:1, kep:2, ekor:3, JA:0, JD:1, JT:2, JS:3};
  return d[map[pos] ?? 3] ?? 0;
}

// ============================================================
// HITUNG NILAI RUMUS dari result 4D
// token: {pos1, mod1, op, pos2, mod2, sfx}
// ============================================================
function calcToken(tok, result4d) {
  const a = applyMod(getDigit(result4d, tok.pos1), tok.mod1);
  const b = applyMod(getDigit(result4d, tok.pos2), tok.mod2);
  let val = tok.op === '-' ? (a - b + 10) % 10 : (a + b) % 10;
  if (tok.sfx) val = applyMod(val, tok.sfx);
  return val;
}

// ============================================================
// BUILD KEY STRING dari token
// ============================================================
function tokToKey(tok) {
  const posLabel = {as:'AS', kop:'KOP', kep:'KEP', ekor:'EKOR'};
  const p1 = posLabel[tok.pos1] || tok.pos1;
  const p2 = posLabel[tok.pos2] || tok.pos2;
  const m1 = tok.mod1 ? tok.mod1.toUpperCase() : '';
  const m2 = tok.mod2 ? tok.mod2.toUpperCase() : '';
  const sf = tok.sfx ? '.'+tok.sfx.toUpperCase() : '';
  return `${p1}${m1}${tok.op}${p2}${m2}${sf}`;
}

// ============================================================
// SLIDING TABLE
// ============================================================
function buildSlide(digit) {
  return Array.from({length:10}, (_,c) => (digit + c) % 10);
}

function getTrekCols(target) {
  if (target === '2be') return [7, 9];
  if (target === '2de') return [0, 1];
  if (target === 'ke')  return [9];
  if (target === 'kk')  return [7];
  return [7, 9];
}

function getActualDigit(result4d, target) {
  if (target === '2de') return parseInt(result4d[0]);
  return parseInt(result4d[3]); // default ekor
}

// ============================================================
// FILTER BY HARI
// ============================================================
function filterByHari(history, hariVal) {
  if (hariVal === '' || hariVal === null || hariVal === undefined) return history;
  const h = parseInt(hariVal);
  return history.filter(item => {
    // Parse YYYY-MM-DD as local time (bukan UTC) agar hari tidak meleset
    const [y,m,d] = item.date.split('-').map(Number);
    return new Date(y, m-1, d).getDay() === h;
  });
}

// ============================================================
// EVALUASI TOKEN pada dataset
// ============================================================
function evalToken(tok, data, target, putaran) {
  // use[0] = terbaru (akan jadi AI), use[1..] = data historis
  // Ambil putaran+1 agar kita punya putaran pasang yg bisa dievaluasi
  const use = data.slice(0, putaran + 2);
  if (use.length < 3) return {score:0, hits:0, total:0, ai:null};
  const cols = getTrekCols(target);
  let hits = 0, total = 0;
  // i mulai dari use.length-1 (terlama) turun ke i=2
  // i=1: memprediksi use[0] (AI row, belum ada hasil) → TIDAK dievaluasi
  for (let i = use.length - 1; i >= 2; i--) {
    const val  = calcToken(tok, use[i].result);
    const row  = buildSlide(val);
    const pred = cols.map(c => row[c]);
    const actual = getActualDigit(use[i-1].result, target);
    const hit = pred.includes(actual);
    if (hit) hits++;
    total++;
  }
  // AI prediction: gunakan use[1] (result terbaru yg sudah keluar) untuk prediksi next
  const latest = calcToken(tok, use[1].result);
  const latestRow = buildSlide(latest);
  const ai = cols.map(c => latestRow[c]);
  const score = total > 0 ? hits / total * 10 : 0;
  return {score, hits, total, ai};
}

// ============================================================
// GENERATOR KOMBINASI TOKEN
// ============================================================
const POSITIONS = ['as','kop','kep','ekor'];
const MODS_ALL  = ['','m0','m1','m2','m3','m4','m5','m6','m7','m8','m9','ix','ty','mb'];
const OPS       = ['-','+'];
const MODS_SFX  = ['','m0','m1','m2','m3','m4','m5','m6','m7','m8','m9'];

function* genTokens() {
  for (const pos1 of POSITIONS)
  for (const mod1 of MODS_ALL)
  for (const op   of OPS)
  for (const pos2 of POSITIONS)
  for (const mod2 of MODS_ALL)
  for (const sfx  of MODS_SFX)
    yield {pos1, mod1, op, pos2, mod2, sfx};
}

// ============================================================
// STATE GLOBAL
// ============================================================
let gData = null;
let scanning = false, stopFlag = false;
let topResults = [];

// ============================================================
// LOAD DATA
// ============================================================
async function loadData() {
  const url = document.getElementById('jsonUrl').value.trim();
  setStatus('⏳ Mengambil data dari '+url+'...');
  try {
    const res = await fetch(url, {cache:'no-cache'});
    if (!res.ok) throw new Error('HTTP ' + res.status);
    gData = await res.json();
    const sel = document.getElementById('selPasaran');
    sel.innerHTML = '';
    const keys = Object.keys(gData).sort();
    for (const k of keys) {
      const opt = document.createElement('option');
      opt.value = k;
      opt.text = (gData[k].name || k) + ' (' + k + ')';
      sel.appendChild(opt);
    }
    // Default HK
    const hk = keys.find(k => k === 'hk');
    if (hk) sel.value = hk;
    document.getElementById('btnScan').disabled = false;
    setStatus('✅ '+keys.length+' pasaran dimuat. Pilih pasaran lalu klik Scan.');
    showTrek();
  } catch(e) {
    setStatus('❌ Gagal load: ' + e.message + '. Cek URL dan CORS.');
  }
}

// ============================================================
// TAMPILKAN TREK
// ============================================================
function showTrek(tok, evalResult) {
  const pasaran = document.getElementById('selPasaran').value;
  const hariVal = document.getElementById('selHari').value;
  const target  = document.getElementById('selTarget').value;
  const putaran = parseInt(document.getElementById('inpPutaran').value) || 15;
  if (!gData || !pasaran || !gData[pasaran]) return;

  const history  = gData[pasaran].history || [];
  const filtered = filterByHari(history, hariVal === '' ? null : hariVal);
  const use      = filtered.slice(0, putaran + 2);
  if (use.length < 2) {
    document.getElementById('trekBox').innerHTML = '<p style="color:var(--muted)">Data tidak cukup untuk filter ini.</p>';
    return;
  }

  const cols     = getTrekCols(target);
  const colNames = 'ABCDEFGHIJ'.split('');
  const HARI_LBL = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];

  let keyLabel = '';
  if (tok) {
    const ev = evalResult || evalToken(tok, filtered, target, putaran);
    keyLabel = tokToKey(tok);

    let html = `<div class="trek-section">`;
    html += `<div class="trek-meta">`;
    html += `<b style="color:var(--cyan)">${gData[pasaran].name||pasaran}</b>`;
    if (hariVal !== '') html += ` | <b>${HARI_LBL[hariVal]}</b>`;
    html += ` | <b>${target}</b> | Putaran: <b>${use.length-1}</b>`;
    html += ` | KEY: <span style="color:var(--yellow);font-weight:bold">${keyLabel}</span>`;
    html += `</div>`;

    html += `<div class="trek-wrap"><table class="trek"><thead><tr>`;
    html += `<th>No</th><th>Data</th>`;
    for (const ci of cols) html += `<th style="color:var(--cyan)">${colNames[ci]}</th>`;
    html += `<th></th></tr></thead><tbody>`;

    // Render dari terlama (bawah array) ke terbaru
    // use[0] = AI row (next prediction dari use[1])
    // use[1] = result terbaru → memprediksi use[0] (AI, belum ada hasil) → tidak dihighlight
    // use[2..] = data lama → bisa dihighlight
    for (let i = use.length - 1; i >= 1; i--) {
      const item  = use[i];
      const no    = use.length - i;
      const val   = calcToken(tok, item.result);
      const row   = buildSlide(val);
      const isAi  = i === 1; // baris ini prediksi untuk next (AI) → tampilkan sebagai "??"

      let hitCols = new Set();
      if (!isAi && i >= 2) {
        const actual = getActualDigit(use[i-1].result, target);
        cols.forEach(c => { if (row[c] === actual) hitCols.add(c); });
      }

      html += `<tr><td>${no}</td><td>${item.result}:</td>`;
      for (const ci of cols) {
        const d   = row[ci];
        const isH = hitCols.has(ci);
        if (isAi)
          html += `<td><b style="color:var(--orange)">${d}</b></td>`;
        else
          html += `<td class="${isH ? 'hit-g' : ''}">${d}</td>`;
      }
      html += `<td style="color:var(--muted);font-size:10px">${isAi ? '??' : 'ai'}</td>`;
      html += `</tr>`;
    }

    // AI prediction: dari use[1]
    const aiVal = calcToken(tok, use[1].result);
    const aiRow = buildSlide(aiVal);
    const pred  = cols.map(c => aiRow[c]).join('');

    html += `</tbody></table></div>`;
    html += `<div>ai : <span class="ai-result">${pred}</span>`;
    html += ` <span style="font-size:11px;color:var(--muted)">skor: ${ev.score.toFixed(1)} (${ev.hits}/${ev.total})</span></div>`;
    html += `</div>`;
    document.getElementById('trekBox').innerHTML = html;
  } else {
    // Preview tanpa rumus: tampilkan sliding dari ekor saja
    let html = `<div class="trek-section">`;
    html += `<div class="trek-meta">`;
    html += `<b style="color:var(--cyan)">${gData[pasaran].name||pasaran}</b>`;
    if (hariVal !== '') html += ` | <b>${HARI_LBL[hariVal]}</b>`;
    html += ` | ${use.length-1} putaran tersedia — klik Scan untuk cari rumus terbaik`;
    html += `</div></div>`;
    document.getElementById('trekBox').innerHTML = html;
  }
}

// ============================================================
// SCAN OTOMATIS
// ============================================================
async function startScan() {
  if (scanning) return;
  const pasaran = document.getElementById('selPasaran').value;
  const hariVal = document.getElementById('selHari').value;
  const target  = document.getElementById('selTarget').value;
  const putaran = parseInt(document.getElementById('inpPutaran').value) || 15;
  const topN    = parseInt(document.getElementById('inpTopN').value)    || 10;

  if (!gData || !pasaran) { setStatus('❌ Load data dulu.'); return; }
  const history  = gData[pasaran].history || [];
  const filtered = filterByHari(history, hariVal === '' ? null : hariVal);
  if (filtered.length < 5) { setStatus('❌ Data terlalu sedikit untuk filter ini.'); return; }

  scanning = true; stopFlag = false; topResults = [];
  document.getElementById('btnScan').disabled = true;
  document.getElementById('btnStop').style.display = 'inline-block';
  switchTab('tabHasil');

  const gen   = genTokens();
  let done    = 0;
  const total = POSITIONS.length * MODS_ALL.length * OPS.length * POSITIONS.length * MODS_ALL.length * MODS_SFX.length;
  // total = 4×14×2×4×14×10 = 62,720

  setStatus(`🔍 Scanning ${total.toLocaleString()} kombinasi...`);
  document.getElementById('progressBar').style.width = '0%';

  let lastUI = Date.now();
  const BATCH = 500;
  const batch = [];

  for (const tok of gen) {
    if (stopFlag) break;
    batch.push(tok);
    if (batch.length >= BATCH) {
      for (const t of batch) {
        const ev = evalToken(t, filtered, target, putaran);
        if (ev.total < 3) { done++; continue; }
        if (topResults.length < topN || ev.score > topResults[topResults.length-1].score) {
          topResults.push({tok:t, key:tokToKey(t), score:ev.score, hits:ev.hits, total:ev.total, ai:ev.ai});
          topResults.sort((a,b) => b.score - a.score);
          if (topResults.length > topN) topResults.length = topN;
        }
        done++;
      }
      batch.length = 0;
      const now = Date.now();
      if (now - lastUI > 80) {
        const pct = (done / total * 100).toFixed(1);
        document.getElementById('progressBar').style.width = pct + '%';
        const t0 = topResults[0];
        setStatus(`🔍 ${done.toLocaleString()} / ${total.toLocaleString()} (${pct}%) | Best: ${t0 ? t0.key+' '+t0.score.toFixed(1) : '-'}`);
        renderHasil(topN, pasaran, hariVal);
        await new Promise(r => setTimeout(r, 0));
        lastUI = Date.now();
      }
    }
  }
  // flush remaining
  for (const t of batch) {
    if (stopFlag) break;
    const ev = evalToken(t, filtered, target, putaran);
    if (ev.total >= 3) {
      if (topResults.length < topN || ev.score > topResults[topResults.length-1].score) {
        topResults.push({tok:t, key:tokToKey(t), score:ev.score, hits:ev.hits, total:ev.total, ai:ev.ai});
        topResults.sort((a,b) => b.score - a.score);
        if (topResults.length > topN) topResults.length = topN;
      }
    }
    done++;
  }

  scanning = false; stopFlag = false;
  document.getElementById('btnScan').disabled = false;
  document.getElementById('btnStop').style.display = 'none';
  document.getElementById('progressBar').style.width = '100%';
  const t0 = topResults[0];
  setStatus(`✅ Selesai. ${done.toLocaleString()} diuji. Rumus terbaik: ${t0 ? t0.key+' ('+t0.score.toFixed(1)+')' : '-'}`);
  renderHasil(topN, pasaran, hariVal);
  if (t0) { switchTab('tabTrek'); showTrek(t0.tok); }
}

function stopScan() {
  stopFlag = true;
  setStatus('⏹ Scan dihentikan oleh user.');
}

function renderHasil(topN, pasaran, hariVal) {
  const HARI_LBL = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const name = gData && pasaran && gData[pasaran] ? (gData[pasaran].name || pasaran) : pasaran;
  const hLabel = (hariVal !== '' && hariVal !== null && hariVal !== undefined) ? ` | ${HARI_LBL[hariVal]}` : '';
  let html = `<div id="hasilBox"><h3>🏆 Top ${topN} Rumus — ${name}${hLabel}</h3>`;
  if (!topResults.length) {
    html += '<p style="color:var(--muted);font-size:12px">Belum ada hasil.</p>';
  } else {
    for (let i = 0; i < topResults.length; i++) {
      const r = topResults[i];
      const pred = r.ai ? r.ai.join('') : '??';
      html += `<div class="rumus-row" onclick="pickKey(${i})">`;
      html += `<span style="color:var(--muted);min-width:20px">#${i+1}</span>`;
      html += `<span class="rumus-key">${r.key}</span>`;
      html += `<span class="rumus-score">${r.hits}/${r.total}</span>`;
      html += `<span class="rumus-ai">AI: <b class="rumus-pred">${pred}</b></span>`;
      html += `<span style="color:var(--yellow)">⭐${r.score.toFixed(1)}</span>`;
      html += `</div>`;
    }
  }
  html += '</div>';
  document.getElementById('hasilBox').outerHTML = html;
}

function pickKey(idx) {
  if (!topResults[idx]) return;
  switchTab('tabTrek');
  showTrek(topResults[idx].tok);
}

// ============================================================
// UI HELPERS
// ============================================================
function setStatus(msg) { document.getElementById('status').textContent = msg; }

function switchTab(id) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const idx = {tabTrek:0, tabHasil:1}[id] || 0;
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

// Auto load on start
window.addEventListener('load', () => {
  const url = document.getElementById('jsonUrl').value;
  if (url.includes('github') || url.includes('http')) loadData();
});
</script>
