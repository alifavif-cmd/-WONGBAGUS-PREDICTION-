<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scanner Rumus Pro — WONGBAGUS PREDICTION</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#f59e0b;--gold-light:#fcd34d;--bg:#07070e;--bg2:#0f0f1a;--bg3:#15152a;--card:#111128;--border:rgba(245,158,11,0.15);--text:#e2e2f0;--muted:#6b6b8a;--green:#10b981;--red:#dc2626;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:99;}
.topbar-logo{width:36px;height:36px;background:linear-gradient(135deg,#f59e0b,#b45309);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:18px;color:#000;text-decoration:none;}
.topbar-title{font-family:'Bebas Neue';font-size:18px;letter-spacing:1px;background:linear-gradient(90deg,#fcd34d,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-back{margin-left:auto;padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Nunito';font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;}
.container{max-width:600px;margin:0 auto;padding:16px;}
.page-title{font-family:'Bebas Neue';font-size:26px;letter-spacing:2px;color:var(--gold);margin:16px 0 4px;}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
label{font-size:12px;color:var(--muted);font-weight:700;display:block;margin-bottom:4px;}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Nunito';font-size:14px;width:100%;outline:none;margin-bottom:10px;}
input:focus,select:focus{border-color:var(--gold);}
.btn{padding:11px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Nunito';font-size:14px;font-weight:800;transition:.2s;width:100%;}
.btn-gold{background:linear-gradient(135deg,#f59e0b,#b45309);color:#000;}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#4c1d95);color:#fff;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.divider{height:1px;background:var(--border);margin:12px 0;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-gold{background:rgba(245,158,11,.15);color:var(--gold);border:1px solid rgba(245,158,11,.3);}
.badge-green{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3);}
.badge-red{background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.3);}
.badge-purple{background:rgba(124,58,237,.15);color:#a78bfa;border:1px solid rgba(124,58,237,.3);}
.ai-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(76,29,149,.2));border:1px solid rgba(124,58,237,.4);border-radius:20px;font-size:12px;font-weight:800;color:#a78bfa;margin-bottom:12px;}
.rumus-row{background:var(--bg3);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;flex-direction:column;gap:6px;}
.rumus-row-top{display:flex;justify-content:space-between;align-items:center;}
.rumus-formula{font-family:'Courier New',monospace;font-size:13px;color:var(--gold);font-weight:700;}
.rumus-hasil{font-family:'Bebas Neue';font-size:28px;letter-spacing:4px;color:#fff;text-align:center;padding:8px 0;}
.rumus-stats{display:flex;gap:6px;flex-wrap:wrap;}
.trek-bar{height:6px;border-radius:3px;background:var(--bg2);margin-top:4px;overflow:hidden;}
.trek-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#10b981,#f59e0b);}
.loading-pulse{animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.groq-box{background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(76,29,149,.05));border:1px solid rgba(124,58,237,.3);border-radius:14px;padding:16px;margin-top:12px;}
.groq-title{font-size:12px;font-weight:800;color:#a78bfa;margin-bottom:8px;letter-spacing:.5px;}
.groq-text{font-size:13px;color:var(--text);line-height:1.7;}
.angka-highlight{display:inline-flex;width:34px;height:34px;background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.4);border-radius:8px;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:var(--gold);}
.no-key-warn{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);border-radius:12px;padding:14px;text-align:center;font-size:13px;color:#f87171;}
footer{text-align:center;padding:24px 16px;border-top:1px solid var(--border);margin-top:24px;color:var(--muted);font-size:11px;}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="topbar-logo">WB</a>
  <span class="topbar-title">WONGBAGUS PREDICTION</span>
  <a href="index.html" class="topbar-back">← Kembali</a>
</div>

<div class="container">
  <div class="page-title">🔍 Scanner Rumus Pro</div>
  <p class="page-sub">Deteksi angka main akurat dengan AI Groq — analisis pola historis otomatis</p>

  <div id="noKeyWarn" class="no-key-warn" style="display:none;margin-bottom:14px;">
    ⚠️ Groq API Key belum diset! <br>
    <span style="font-size:11px;color:var(--muted);">Buka Settings di halaman utama → input Groq API Key</span>
  </div>

  <div class="card">
    <div class="card-title">⚙️ Konfigurasi Scanner</div>

    <label>Pasaran</label>
    <select id="pasaran">
      <option value="SGP">🇸🇬 Singapore (SGP)</option>
      <option value="HK">🇭🇰 Hongkong (HK)</option>
      <option value="SDY">🇦🇺 Sydney (SDY)</option>
      <option value="KAM" selected>🇰🇭 Kamboja (KAM)</option>
      <option value="MACAU">🇲🇴 Macau</option>
      <option value="TAIWAN">🇹🇼 Taiwan</option>
      <option value="BANGKOK">🇹🇭 Bangkok</option>
    </select>

    <label>5 Result Terakhir (pisah koma atau spasi)</label>
    <input type="text" id="results" placeholder="Contoh: 4821, 9249, 3317, 7760, 2145">

    <label>Target Analisa</label>
    <select id="target">
      <option value="2D">2D — Kepala & Ekor</option>
      <option value="3D">3D — 3 digit</option>
      <option value="4D" selected>4D — Full</option>
      <option value="KEPALA">Kepala saja</option>
      <option value="EKOR">Ekor saja</option>
    </select>

    <label>Kedalaman Analisa</label>
    <select id="depth">
      <option value="cepat">⚡ Cepat — Pola Dasar</option>
      <option value="sedang" selected>🔍 Sedang — Pola + Korelasi</option>
      <option value="dalam">🧠 Dalam — Full Matrix + Mistik</option>
    </select>

    <button class="btn btn-purple" onclick="jalankanScanner()">
      🔍 Jalankan Scanner AI
    </button>
  </div>

  <div id="scanResult"></div>
</div>

<footer>
  <strong>WONGBAGUS PREDICTION</strong><br>
  <a href="index.html" style="color:var(--gold);text-decoration:none;font-size:11px;">← Kembali ke Beranda</a>
</footer>

<script>
function getGroqKey(){return localStorage.getItem('wb_groq_key')||'';}

window.addEventListener('DOMContentLoaded',()=>{
  if(!getGroqKey()) document.getElementById('noKeyWarn').style.display='block';
});

function buildPrompt(pasaran, results, target, depth){
  const depthDesc = depth==='cepat' ? 'analisa pola dasar (frekuensi digit, posisi)' :
    depth==='sedang' ? 'analisa pola + korelasi antar digit + trend naik/turun' :
    'full matrix analysis: frekuensi, posisi, mistik (shio, kepala-ekor), korelasi antar pasaran, rumus A/C/K/E/J';

  return `Kamu adalah Scanner Rumus Pro untuk togel pasaran ${pasaran}. 
Data result terakhir: ${results}
Target: ${target}
Kedalaman: ${depthDesc}

Lakukan analisa ${depthDesc} dari data result di atas.

Berikan output dalam format JSON (HANYA JSON, tidak ada teks lain):
{
  "angka_main": "digit tunggal paling potensial",
  "kepala": "digit kepala",  
  "ekor": "digit ekor",
  "prediksi_2d": "2 digit",
  "prediksi_3d": "3 digit",
  "prediksi_4d": "4 digit",
  "bbfs_4d": ["angka1","angka2","angka3","angka4","angka5","angka6"],
  "bbfs_3d": ["angka1","angka2","angka3","angka4"],
  "bbfs_2d": ["angka1","angka2","angka3"],
  "bola_panas": ["a","b","c","d","e"],
  "angka_mati": ["x","y","z"],
  "rumus_1": {"formula": "deskripsi rumus singkat", "hasil": "2D hasil rumus", "akurasi": "persentase"},
  "rumus_2": {"formula": "deskripsi rumus 2", "hasil": "2D", "akurasi": "persentase"},
  "rumus_3": {"formula": "deskripsi rumus 3", "hasil": "2D", "akurasi": "persentase"},
  "rumus_4": {"formula": "deskripsi rumus 4", "hasil": "2D", "akurasi": "persentase"},
  "rumus_5": {"formula": "deskripsi rumus 5", "hasil": "2D", "akurasi": "persentase"},
  "analisa": "penjelasan singkat mengapa angka-angka ini dipilih (2-3 kalimat)",
  "kekuatan": "Kuat/Sedang/Lemah",
  "shio": "nama shio"
}`;
}

async function jalankanScanner(){
  const key = getGroqKey();
  if(!key){
    document.getElementById('noKeyWarn').style.display='block';
    alert('⚠️ Set Groq API Key dulu di Settings!');
    return;
  }

  const pasaran = document.getElementById('pasaran').value;
  const results = document.getElementById('results').value.trim();
  const target  = document.getElementById('target').value;
  const depth   = document.getElementById('depth').value;

  if(!results){
    alert('Masukkan minimal 3 result terakhir!');
    return;
  }

  const el = document.getElementById('scanResult');
  el.innerHTML = `<div class="card" style="text-align:center;padding:30px;">
    <div class="loading-pulse" style="font-size:32px;margin-bottom:12px;">🔍</div>
    <div style="font-weight:800;color:var(--gold);margin-bottom:6px;">Scanner sedang berjalan...</div>
    <div style="font-size:12px;color:var(--muted);">Groq AI menganalisa ${results.split(/[,\s]+/).length} data result</div>
  </div>`;

  try{
    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        max_tokens:1500,
        temperature:0.4,
        messages:[{role:'user',content:buildPrompt(pasaran,results,target,depth)}]
      })
    });
    const data = await resp.json();
    if(!resp.ok) throw new Error(data.error?.message||'API Error');

    const raw = data.choices[0].message.content.trim();
    const clean = raw.replace(/```json|```/g,'').trim();
    const p = JSON.parse(clean);
    renderScanResult(p, pasaran, results, target);
  }catch(e){
    el.innerHTML=`<div class="card" style="color:#f87171;text-align:center;">
      ⚠️ Gagal: ${e.message}<br>
      <span style="font-size:11px;color:var(--muted);">Cek API Key & koneksi internet</span>
    </div>`;
  }
}

function renderScanResult(p, pasaran, results, target){
  const el = document.getElementById('scanResult');
  const kelas = p.kekuatan==='Kuat'?'badge-green':p.kekuatan==='Sedang'?'badge-gold':'badge-red';
  const rumusArr = [p.rumus_1,p.rumus_2,p.rumus_3,p.rumus_4,p.rumus_5].filter(Boolean);

  el.innerHTML = `
  <div class="card">
    <div class="ai-badge">🤖 Groq AI — Scanner Pro</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div>
        <div style="font-weight:900;font-size:15px;">${pasaran}</div>
        <div style="font-size:11px;color:var(--muted);">Dari: ${results}</div>
      </div>
      <span class="badge ${kelas}">${p.kekuatan||'Sedang'}</span>
    </div>

    <div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:14px;padding:16px;text-align:center;margin-bottom:14px;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">ANGKA UTAMA</div>
      <div style="font-family:'Bebas Neue';font-size:42px;letter-spacing:8px;">${p.prediksi_4d||'----'}</div>
      <div style="display:flex;justify-content:center;gap:12px;margin-top:6px;">
        <span style="font-size:11px;color:var(--muted);">3D: <b style="color:var(--gold)">${p.prediksi_3d||'---'}</b></span>
        <span style="font-size:11px;color:var(--muted);">2D: <b style="color:var(--gold)">${p.prediksi_2d||'--'}</b></span>
        <span style="font-size:11px;color:var(--muted);">Main: <b style="color:var(--gold)">${p.angka_main||'-'}</b></span>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
      <div style="background:var(--bg3);border-radius:12px;padding:12px;text-align:center;">
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px;">KEPALA</div>
        <div style="font-family:'Bebas Neue';font-size:36px;color:var(--gold)">${p.kepala||'-'}</div>
      </div>
      <div style="background:var(--bg3);border-radius:12px;padding:12px;text-align:center;">
        <div style="font-size:10px;color:var(--muted);margin-bottom:4px;">EKOR</div>
        <div style="font-family:'Bebas Neue';font-size:36px;color:#60a5fa">${p.ekor||'-'}</div>
      </div>
    </div>

    <div class="divider"></div>
    <div style="margin-bottom:12px;">
      <div style="font-size:11px;color:var(--muted);font-weight:800;margin-bottom:8px;">🎲 BBFS</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">4D:</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
        ${(p.bbfs_4d||[]).map(n=>`<div style="width:34px;height:34px;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:var(--gold)">${n}</div>`).join('')}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">3D:</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
        ${(p.bbfs_3d||[]).map(n=>`<div style="width:34px;height:34px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:var(--green)">${n}</div>`).join('')}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">2D:</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        ${(p.bbfs_2d||[]).map(n=>`<div style="width:34px;height:34px;background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#60a5fa">${n}</div>`).join('')}
      </div>
    </div>

    <div class="divider"></div>
    <div style="display:flex;gap:14px;margin-bottom:14px;">
      <div style="flex:1;">
        <div style="font-size:10px;color:var(--muted);font-weight:800;margin-bottom:6px;">🔥 BOLA PANAS</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;">
          ${(p.bola_panas||[]).map(n=>`<div style="width:30px;height:30px;background:rgba(245,158,11,.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:var(--gold)">${n}</div>`).join('')}
        </div>
      </div>
      <div style="flex:1;">
        <div style="font-size:10px;color:var(--muted);font-weight:800;margin-bottom:6px;">💀 ANGKA MATI</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;">
          ${(p.angka_mati||[]).map(n=>`<div style="width:30px;height:30px;background:rgba(220,38,38,.15);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:#f87171">${n}</div>`).join('')}
        </div>
      </div>
    </div>

    <div class="divider"></div>
    <div style="margin-bottom:12px;">
      <div style="font-size:11px;color:var(--muted);font-weight:800;margin-bottom:10px;">📐 RUMUS TERKUAT</div>
      ${rumusArr.map((r,i)=>`
      <div style="background:var(--bg3);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-size:11px;font-weight:800;color:var(--muted);margin-bottom:2px;">Rumus ${i+1}</div>
          <div style="font-size:12px;color:var(--text);">${r.formula}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:'Bebas Neue';font-size:24px;letter-spacing:3px;color:var(--gold)">${r.hasil||'-'}</div>
          <span class="badge badge-green" style="font-size:10px;">${r.akurasi||'-'}</span>
        </div>
      </div>`).join('')}
    </div>

    <div class="groq-box">
      <div class="groq-title">🧠 ANALISA AI</div>
      <div class="groq-text">${p.analisa||'-'}</div>
      ${p.shio?`<div style="margin-top:8px;font-size:12px;color:var(--muted);">🐾 Shio: <b style="color:var(--gold)">${p.shio}</b></div>`:''}
    </div>

    <div class="divider"></div>
    <button class="btn btn-outline" style="font-size:12px;" onclick="copyScan()">📋 Copy Hasil Scanner</button>
  </div>`;

  window._scanData = {p, pasaran};
}

function copyScan(){
  const d = window._scanData;
  if(!d) return;
  const p = d.p;
  const rumusArr = [p.rumus_1,p.rumus_2,p.rumus_3,p.rumus_4,p.rumus_5].filter(Boolean);
  const txt = [
    'WONGBAGUS PREDICTION',
    `🔍 Scanner Rumus Pro — ${d.pasaran}`,
    '━━━━━━━━━━━━━━━━━━━━━━━',
    `4D : ${p.prediksi_4d}  3D : ${p.prediksi_3d}  2D : ${p.prediksi_2d}`,
    `Kepala: ${p.kepala}  Ekor: ${p.ekor}  Main: ${p.angka_main}`,
    '━━━━━━━━━━━━━━━━━━━━━━━',
    `🎲 BBFS 4D : ${(p.bbfs_4d||[]).join(' ')}`,
    `🎲 BBFS 3D : ${(p.bbfs_3d||[]).join(' ')}`,
    `🎲 BBFS 2D : ${(p.bbfs_2d||[]).join(' ')}`,
    '━━━━━━━━━━━━━━━━━━━━━━━',
    ...rumusArr.map((r,i)=>`📐 Rumus ${i+1}: ${r.formula} → ${r.hasil} (${r.akurasi})`),
    '━━━━━━━━━━━━━━━━━━━━━━━',
    `🔥 Bola Panas : ${(p.bola_panas||[]).join(' ')}`,
    `💀 Angka Mati : ${(p.angka_mati||[]).join(' ')}`,
    `🐾 Shio       : ${p.shio||'-'}`,
    '━━━━━━━━━━━━━━━━━━━━━━━',
    `🧠 ${p.analisa||''}`,
    '━━━━━━━━━━━━━━━━━━━━━━━',
    '🌐 https://alifavif-cmd.github.io/-WONGBAGUS-PREDICTION-/'
  ].join('\n');
  navigator.clipboard.writeText(txt).then(()=>alert('✅ Tersalin!')).catch(()=>{});
}
</script>
</body></html>
