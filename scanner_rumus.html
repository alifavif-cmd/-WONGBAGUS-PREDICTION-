<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scanner Rumus Pro 2026 — WONGBAGUS PREDICTION</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#f59e0b;--gold-light:#fcd34d;--gold-dark:#b45309;--bg:#07070e;--bg2:#0f0f1a;--bg3:#15152a;--card:#111128;--border:rgba(245,158,11,0.15);--text:#e2e2f0;--muted:#6b6b8a;--green:#10b981;--red:#dc2626;--purple:#7c3aed;--cyan:#00d4ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(245,158,11,.05) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(7,7,14,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:99;}
.topbar-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--red));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:16px;color:#000;text-decoration:none;font-weight:900;flex-shrink:0;}
.topbar-info{flex:1;}
.topbar-title{font-family:'Bebas Neue';font-size:16px;letter-spacing:1px;background:linear-gradient(90deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.topbar-sub{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.5px;}
.topbar-back{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-family:'Nunito';font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s;flex-shrink:0;}
.topbar-back:hover{border-color:var(--gold);color:var(--gold);}

/* LAYOUT */
.container{max-width:640px;margin:0 auto;padding:16px;position:relative;z-index:1;}
.page-hero{text-align:center;padding:20px 0 6px;}
.page-hero-icon{font-size:36px;margin-bottom:8px;}
.page-title{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;color:var(--gold);line-height:1;}
.page-sub{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.6;}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.card-title::before{content:'';display:block;width:3px;height:14px;background:var(--gold);border-radius:2px;}

/* FORM ELEMENTS */
label{font-size:11px;color:var(--muted);font-weight:800;display:block;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
select,input,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Nunito';font-size:14px;font-weight:600;width:100%;outline:none;margin-bottom:12px;transition:border-color .2s;}
select:focus,input:focus,textarea:focus{border-color:var(--gold);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-row > div select{margin-bottom:0;}

/* RESULT HINT */
.result-hint{font-size:11px;color:var(--green);font-weight:700;min-height:18px;margin:-8px 0 10px;display:flex;align-items:center;gap:5px;}
.result-hint.warn{color:#fbbf24;}

/* AUTOFILL BTN */
.btn-autofill{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:var(--green);border-radius:8px;padding:5px 12px;font-family:'Nunito';font-size:12px;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap;}
.btn-autofill:hover{background:rgba(16,185,129,.25);}
.btn-autofill:disabled{opacity:.4;cursor:not-allowed;}
.label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.label-row label{margin-bottom:0;}

/* BUTTONS */
.btn{padding:12px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Nunito';font-size:14px;font-weight:800;transition:.2s;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-scan{background:linear-gradient(135deg,#7c3aed,#4c1d95);color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.3);}
.btn-scan:hover{opacity:.9;transform:translateY(-1px);}
.btn-scan:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}

/* AI KEY WARN */
.no-key-warn{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.3);border-radius:12px;padding:12px 14px;font-size:12px;color:#f87171;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start;}

/* LOADING */
.loading-state{text-align:center;padding:32px 16px;}
.loading-spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.loading-dots{display:flex;justify-content:center;gap:5px;margin-top:10px;}
.loading-dots span{width:6px;height:6px;background:var(--purple);border-radius:50%;animation:pulse .8s ease-in-out infinite;}
.loading-dots span:nth-child(2){animation-delay:.15s;}
.loading-dots span:nth-child(3){animation-delay:.3s;}

/* RESULT CARD */
.result-hero{background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(76,29,149,.08));border:1px solid rgba(124,58,237,.3);border-radius:14px;padding:20px;text-align:center;margin-bottom:14px;}
.result-hero-label{font-size:10px;font-weight:800;color:#a78bfa;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.result-4d{font-family:'Bebas Neue';font-size:56px;letter-spacing:8px;color:#fff;line-height:1;text-shadow:0 0 30px rgba(124,58,237,.5);}
.result-sub-row{display:flex;justify-content:center;gap:20px;margin-top:10px;}
.result-sub-item{text-align:center;}
.result-sub-lbl{font-size:9px;color:var(--muted);font-weight:800;letter-spacing:.5px;}
.result-sub-val{font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:var(--gold);}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-box{background:var(--bg3);border-radius:12px;padding:12px;text-align:center;}
.stat-lbl{font-size:9px;color:var(--muted);font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;}
.stat-val{font-family:'Bebas Neue';font-size:32px;color:var(--gold);line-height:1;}
.stat-val.blue{color:#60a5fa;}

/* BBFS */
.bbfs-section{margin-bottom:14px;}
.bbfs-label{font-size:10px;color:var(--muted);font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.bbfs-chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:18px;font-weight:700;flex-shrink:0;}
.chip-gold{background:rgba(245,158,11,.18);border:1.5px solid rgba(245,158,11,.4);color:var(--gold);}
.chip-green{background:rgba(16,185,129,.15);border:1.5px solid rgba(16,185,129,.35);color:#34d399;}
.chip-blue{background:rgba(96,165,250,.12);border:1.5px solid rgba(96,165,250,.3);color:#60a5fa;}
.chip-red{background:rgba(220,38,38,.15);border:1.5px solid rgba(220,38,38,.35);color:#f87171;}
.chip-muted{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);color:var(--muted);}

/* RUMUS TABLE */
.rumus-item{background:var(--bg3);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.rumus-num{width:22px;height:22px;background:rgba(124,58,237,.25);border:1px solid rgba(124,58,237,.4);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#a78bfa;flex-shrink:0;}
.rumus-formula{flex:1;font-size:12px;color:var(--text);line-height:1.4;}
.rumus-right{text-align:right;flex-shrink:0;}
.rumus-hasil{font-family:'Bebas Neue';font-size:22px;letter-spacing:3px;color:var(--gold);}
.rumus-acc{font-size:10px;font-weight:700;padding:2px 7px;background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);border-radius:50px;color:#34d399;}

/* AI BOX */
.ai-box{background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(76,29,149,.05));border:1px solid rgba(124,58,237,.3);border-radius:12px;padding:14px;margin-top:10px;}
.ai-box-title{font-size:11px;font-weight:800;color:#a78bfa;margin-bottom:8px;letter-spacing:.5px;display:flex;align-items:center;gap:5px;}
.ai-box-text{font-size:13px;color:var(--text);line-height:1.75;}

/* STRENGTH BADGE */
.strength-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;}
.strength-kuat{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#34d399;}
.strength-sedang{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:var(--gold);}
.strength-lemah{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);color:#f87171;}

.divider{height:1px;background:var(--border);margin:14px 0;}

/* SETTINGS BANNER */
.settings-banner{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:12px;padding:12px 14px;margin-bottom:14px;}
.settings-banner-title{font-size:11px;font-weight:800;color:var(--gold);margin-bottom:8px;letter-spacing:.5px;}
.key-input-row{display:flex;gap:8px;}
.key-input-row input{margin-bottom:0;flex:1;}
.key-save-btn{background:var(--gold);color:#000;border:none;border-radius:8px;padding:0 16px;font-weight:800;font-size:12px;cursor:pointer;flex-shrink:0;font-family:'Nunito';}

footer{text-align:center;padding:24px 16px;border-top:1px solid var(--border);margin-top:20px;color:var(--muted);font-size:11px;}
footer a{color:var(--gold);text-decoration:none;}
</style>
<script src="./wb_data.js"></script>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-logo">WB</a>
  <div class="topbar-info">
    <div class="topbar-title">WONGBAGUS PREDICTION</div>
    <div class="topbar-sub">SCANNER RUMUS PRO 2026</div>
  </div>
  <a href="index.html" class="topbar-back">← Beranda</a>
</div>

<div class="container">
  <div class="page-hero">
    <div class="page-hero-icon">🔍</div>
    <div class="page-title">Scanner Rumus Pro</div>
    <p class="page-sub">Algoritma v2.0 · Deteksi Angka Main Akurat · AI Analysis</p>
  </div>

  <!-- GROQ KEY SETTINGS -->
  <div class="settings-banner" id="settingsBanner">
    <div class="settings-banner-title">🔑 Groq API Key (untuk fitur AI Scanner)</div>
    <div class="key-input-row">
      <input type="password" id="groqKeyInput" placeholder="Paste Groq API Key kamu di sini (gsk_...)">
      <button class="key-save-btn" onclick="saveGroqKey()">Simpan</button>
    </div>
    <div id="keyStatus" style="font-size:10px;color:var(--muted);margin-top:4px;"></div>
  </div>

  <!-- CONFIG CARD -->
  <div class="card">
    <div class="card-title">Konfigurasi Scanner</div>

    <label>Pasaran <span id="dataStatus" style="text-transform:none;font-size:10px;color:var(--muted);"></span></label>
    <select id="pasaran" onchange="onPasaranChange()">
      <option value="">⏳ Memuat 65 pasaran...</option>
    </select>
    <div class="result-hint" id="resultHint"></div>

    <div class="label-row">
      <label>5 Result Terakhir (pisah koma/spasi)</label>
      <button class="btn-autofill" id="btnAutoFill" onclick="autoFillResult()" disabled>📡 Isi Otomatis</button>
    </div>
    <input type="text" id="results" placeholder="Contoh: 6284, 5351, 7758, 3821, 9045" style="font-size:15px;font-weight:700;letter-spacing:2px;">

    <div class="form-row">
      <div>
        <label>Target Analisa</label>
        <select id="target">
          <option value="2D">2D — Kepala & Ekor</option>
          <option value="3D">3D — 3 Digit</option>
          <option value="4D" selected>4D — Full</option>
          <option value="KEPALA">Kepala Saja</option>
          <option value="EKOR">Ekor Saja</option>
        </select>
      </div>
      <div>
        <label>Kedalaman Analisa</label>
        <select id="depth">
          <option value="cepat">⚡ Cepat</option>
          <option value="sedang" selected>🔍 Sedang</option>
          <option value="dalam">🧠 Dalam</option>
        </select>
      </div>
    </div>

    <button class="btn btn-scan" id="btnScan" onclick="jalankanScanner()">
      🔍 Jalankan Scanner AI
    </button>
  </div>

  <div id="scanResult"></div>
</div>

<footer>
  <strong>WONGBAGUS PREDICTION</strong> · Scanner Rumus Pro 2026<br>
  <a href="index.html">← Kembali ke Beranda</a>
</footer>

<script>
// ── GROQ KEY ──────────────────────────────────────────────
function getGroqKey(){return localStorage.getItem('wb_groq_key')||'';}
function saveGroqKey(){
  const k=document.getElementById('groqKeyInput').value.trim();
  if(!k){alert('Key tidak boleh kosong!');return;}
  localStorage.setItem('wb_groq_key',k);
  document.getElementById('keyStatus').textContent='✅ Key tersimpan!';
  document.getElementById('keyStatus').style.color='#34d399';
  document.getElementById('settingsBanner').style.background='rgba(16,185,129,.06)';
  document.getElementById('settingsBanner').style.borderColor='rgba(16,185,129,.3)';
  setTimeout(()=>{document.getElementById('keyStatus').textContent='';},3000);
}
window.addEventListener('DOMContentLoaded',()=>{
  const k=getGroqKey();
  if(k){
    document.getElementById('groqKeyInput').value='•'.repeat(20);
    document.getElementById('keyStatus').textContent='✅ API Key aktif';
    document.getElementById('keyStatus').style.color='#34d399';
  }
});

// ── BUILD PROMPT ──────────────────────────────────────────
function buildPrompt(pasaran,results,target,depth){
  const depthDesc=depth==='cepat'?'pola dasar (frekuensi digit, posisi kepala-ekor)':
    depth==='sedang'?'pola + korelasi antar digit + trend naik/turun + hot cold':
    'full matrix analysis: frekuensi, posisi, mistik, shio, rumus A/C/K/E/J, korelasi silang';
  return `Kamu adalah Scanner Rumus Pro expert untuk togel ${pasaran}.
Data result LALU (sudah keluar): ${results}
Target: ${target} | Kedalaman: ${depthDesc}

PENTING: prediksi_4d, prediksi_3d, prediksi_2d adalah angka BERIKUTNYA yang BELUM keluar.
JANGAN masukkan angka dari data result lalu ke dalam field prediksi.
prediksi_4d harus TEPAT 4 digit angka baru, BUKAN format "xxxx-yyyy".

Analisa ${depthDesc}. Jawab HANYA JSON valid, tidak ada teks lain:
{"angka_main":"1 digit","kepala":"1 digit","ekor":"1 digit","prediksi_2d":"2d","prediksi_3d":"3d","prediksi_4d":"4d","bbfs_4d":["6 angka"],"bbfs_3d":["4 angka"],"bbfs_2d":["3 angka"],"bola_panas":["5 digit"],"angka_mati":["3 digit"],"rumus_1":{"formula":"desc","hasil":"2d","akurasi":"xx%"},"rumus_2":{"formula":"desc","hasil":"2d","akurasi":"xx%"},"rumus_3":{"formula":"desc","hasil":"2d","akurasi":"xx%"},"rumus_4":{"formula":"desc","hasil":"2d","akurasi":"xx%"},"rumus_5":{"formula":"desc","hasil":"2d","akurasi":"xx%"},"analisa":"2-3 kalimat analisa","kekuatan":"Kuat/Sedang/Lemah","shio":"nama shio"}`;
}

// ── SCANNER ───────────────────────────────────────────────
async function jalankanScanner(){
  const key=getGroqKey();
  if(!key){alert('⚠️ Set Groq API Key dulu!');document.getElementById('groqKeyInput').focus();return;}
  const pasaran=document.getElementById('pasaran').options[document.getElementById('pasaran').selectedIndex]?.text||'Unknown';
  const results=document.getElementById('results').value.trim();
  const target=document.getElementById('target').value;
  const depth=document.getElementById('depth').value;
  if(!results){alert('Masukkan minimal 3 result terakhir!');return;}
  const nums=results.split(/[,\s]+/).filter(v=>v.length===4&&!isNaN(v));
  if(nums.length<3){alert('Minimal 3 result valid (4 digit)!');return;}

  const el=document.getElementById('scanResult');
  el.innerHTML=`<div class="card"><div class="loading-state">
    <div class="loading-spinner"></div>
    <div style="font-weight:800;color:#a78bfa;font-size:15px;">Scanner sedang berjalan...</div>
    <div style="font-size:12px;color:var(--muted);margin-top:6px;">Groq AI menganalisa ${nums.length} data result</div>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div></div>`;
  document.getElementById('btnScan').disabled=true;

  try{
    const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:1200,temperature:0.4,
        messages:[{role:'user',content:buildPrompt(pasaran,nums.join(', '),target,depth)}]})
    });
    const data=await resp.json();
    if(!resp.ok)throw new Error(data.error?.message||'API Error '+resp.status);
    const raw=data.choices[0].message.content.trim().replace(/```json|```/g,'').trim();
    const p=JSON.parse(raw);
    // Sanitasi: pastikan prediksi tidak mengandung angka input (format "xxxx-yyyy")
    if(p.prediksi_4d&&p.prediksi_4d.includes('-'))p.prediksi_4d=p.prediksi_4d.split('-').pop().trim();
    if(p.prediksi_3d&&p.prediksi_3d.includes('-'))p.prediksi_3d=p.prediksi_3d.split('-').pop().trim();
    if(p.prediksi_2d&&p.prediksi_2d.includes('-'))p.prediksi_2d=p.prediksi_2d.split('-').pop().trim();
    renderResult(p,pasaran,nums.join(', '));
  }catch(e){
    el.innerHTML=`<div class="card" style="text-align:center;padding:24px;">
      <div style="font-size:28px;margin-bottom:10px;">⚠️</div>
      <div style="color:#f87171;font-weight:800;margin-bottom:6px;">Scanner Gagal</div>
      <div style="font-size:12px;color:var(--muted);">${e.message}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px;">Cek API Key & koneksi internet</div>
    </div>`;
  }finally{document.getElementById('btnScan').disabled=false;}
}

function renderResult(p,pasaran,results){
  const kelas=p.kekuatan==='Kuat'?'strength-kuat':p.kekuatan==='Sedang'?'strength-sedang':'strength-lemah';
  const rumusArr=[p.rumus_1,p.rumus_2,p.rumus_3,p.rumus_4,p.rumus_5].filter(Boolean);
  window._scanData={p,pasaran,results};

  document.getElementById('scanResult').innerHTML=`
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div>
        <div style="font-family:'Bebas Neue';font-size:16px;color:var(--gold-light);">${pasaran}</div>
        <div style="font-size:11px;color:var(--muted);">Dari: ${results}</div>
      </div>
      <span class="strength-badge ${kelas}">${p.kekuatan||'Sedang'}</span>
    </div>

    <div class="result-hero">
      <div class="result-hero-label">🤖 Prediksi AI — Scanner Pro</div>
      <div class="result-4d">${p.prediksi_4d||'----'}</div>
      <div class="result-sub-row">
        <div class="result-sub-item"><div class="result-sub-lbl">3D</div><div class="result-sub-val">${p.prediksi_3d||'---'}</div></div>
        <div class="result-sub-item"><div class="result-sub-lbl">2D</div><div class="result-sub-val">${p.prediksi_2d||'--'}</div></div>
        <div class="result-sub-item"><div class="result-sub-lbl">Main</div><div class="result-sub-val">${p.angka_main||'-'}</div></div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-box">
        <div class="stat-lbl">Kepala</div>
        <div class="stat-val">${p.kepala||'-'}</div>
      </div>
      <div class="stat-box">
        <div class="stat-lbl">Ekor</div>
        <div class="stat-val blue">${p.ekor||'-'}</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="bbfs-section">
      <div class="bbfs-label">🎲 BBFS 4D</div>
      <div class="bbfs-chips">${(p.bbfs_4d||[]).map(n=>`<div class="chip chip-gold">${n}</div>`).join('')}</div>
    </div>
    <div class="bbfs-section">
      <div class="bbfs-label">🎲 BBFS 3D</div>
      <div class="bbfs-chips">${(p.bbfs_3d||[]).map(n=>`<div class="chip chip-green">${n}</div>`).join('')}</div>
    </div>
    <div class="bbfs-section">
      <div class="bbfs-label">🎲 BBFS 2D</div>
      <div class="bbfs-chips">${(p.bbfs_2d||[]).map(n=>`<div class="chip chip-blue">${n}</div>`).join('')}</div>
    </div>

    <div class="divider"></div>

    <div style="display:flex;gap:14px;margin-bottom:14px;">
      <div style="flex:1;">
        <div class="bbfs-label">🔥 Bola Panas</div>

      </div>
      <div style="flex:1;">
        <div class="bbfs-label">💀 Angka Mati</div>
        <div class="bbfs-chips">${(p.angka_mati||[]).map(n=>`<div class="chip chip-red" style="width:30px;height:30px;font-size:16px;">${n}</div>`).join('')}</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="bbfs-label" style="margin-bottom:10px;">📐 Rumus Terkuat</div>
    ${rumusArr.map((r,i)=>`
    <div class="rumus-item">
      <div class="rumus-num">${i+1}</div>
      <div class="rumus-formula">${r.formula||'-'}</div>
      <div class="rumus-right">

      <div class="ai-box-title">🧠 Analisa AI</div>

    <button class="btn btn-outline" onclick="copyScan()" style="font-size:12px;">📋 Copy Hasil Scanner</button>

}

function copyScan(){
  const d=window._scanData;if(!d)return;
  const p=d.p;
  const rumusArr=[p.rumus_1,p.rumus_2,p.rumus_3,p.rumus_4,p.rumus_5].filter(Boolean);
  const txt=[
    '🔍 WONGBAGUS PREDICTION — Scanner Rumus Pro',
    `Pasaran : ${d.pasaran}`,
    `Data    : ${d.results}`,
    '━━━━━━━━━━━━━━━━━━━━━━━',
    `4D: ${p.prediksi_4d}  3D: ${p.prediksi_3d}  2D: ${p.prediksi_2d}`,
    `Kepala: ${p.kepala}  Ekor: ${p.ekor}  Main: ${p.angka_main}`,
    '━━━━━━━━━━━━━━━━━━━━━━━',
    `🎲 BBFS 4D : ${(p.bbfs_4d||[]).join(' ')}`,
    `🎲 BBFS 3D : ${(p.bbfs_3d||[]).join(' ')}`,
    `🎲 BBFS 2D : ${(p.bbfs_2d||[]).join(' ')}`,
    '━━━━━━━━━━━━━━━━━━━━━━━',
    ...rumusArr.map((r,i)=>`📐 R${i+1}: ${r.formula} → ${r.hasil} (${r.akurasi})`),
    '━━━━━━━━━━━━━━━━━━━━━━━',
    `🔥 Bola Panas : ${(p.bola_panas||[]).join(' ')}`,
    `💀 Angka Mati : ${(p.angka_mati||[]).join(' ')}`,
    `🐾 Shio       : ${p.shio||'-'}`,
    `💪 Kekuatan   : ${p.kekuatan||'-'}`,
    '━━━━━━━━━━━━━━━━━━━━━━━',
    `🧠 ${p.analisa||''}`,
    '━━━━━━━━━━━━━━━━━━━━━━━',
    '🌐 WONGBAGUS PREDICTION'
  ].join('\n');
  navigator.clipboard.writeText(txt).then(()=>alert('✅ Tersalin!')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    alert('✅ Tersalin!');
  });
}

// ── WBData + History ─────────────────────────────────────────
let _wbDataReady=false;

function buildPasaranDropdown(){
  const sel=document.getElementById('pasaran');
  sel.innerHTML='';
  (WBData.MARKETS||[]).forEach(m=>{
    const entry=WBData.get(m.id);
    const hLen=(entry&&entry.history)?entry.history.length:0;
    const o=document.createElement('option');
    o.value=m.id;
    o.textContent=`${m.flag} ${m.name} (${m.short})${hLen?' · '+hLen+'d':''}`;
    sel.appendChild(o);
  });
  sel.value='hk';_wbDataReady=true;
  document.getElementById('btnAutoFill').disabled=false;
  onPasaranChange();
}

function onPasaranChange(){
  const id=document.getElementById('pasaran').value;
  const hint=document.getElementById('resultHint');
  if(!id||!_wbDataReady){hint.textContent='';return;}
  const r=WBData.getResult(id);const entry=WBData.get(id);
  const history=(entry&&entry.history)||[];
  if(r&&r!=='----'){
    const tgl=entry&&entry.tgl?' · '+entry.tgl:'';
    hint.textContent=`📡 Result: ${r}${tgl} · ${history.length} data history`;
    hint.className='result-hint';
  }else if(history.length){
    hint.textContent=`⏳ Belum keluar · ${history.length} data history tersedia`;
    hint.className='result-hint warn';
  }else{
    hint.textContent='⏳ Result & history belum tersedia';
    hint.className='result-hint warn';
  }
}

/**
 * Isi Otomatis — ambil 5 result terakhir dari history.
 * Kalau result hari ini sudah ada → prepend.
 * Urut: terbaru dulu (index 0).
 */
function autoFillResult(){
  const id=document.getElementById('pasaran').value;if(!id)return;
  const entry=WBData.get(id);
  const r=WBData.getResult(id);
  const history=(entry&&entry.history)||[];

  let results=[];

  if(history.length>0){
    // Ambil max 5 result dari history (sudah sorted descending)
    results=history.slice(0,5).map(h=>h.result).filter(v=>v&&/^\d{4}$/.test(v));
    // Kalau result hari ini belum masuk history, prepend
    if(r&&r!=='----'&&results[0]!==r){
      results.unshift(r);
      results=results.slice(0,5);
    }
  }else if(r&&r!=='----'){
    // Fallback: hanya 1 result hari ini
    const cur=document.getElementById('results').value.trim();
    const existing=cur?cur.split(/[,\s]+/).filter(Boolean):[];
    existing.unshift(r);
    results=[...new Set(existing)].slice(0,5);
  }else{
    alert('⚠️ Belum ada result & history. Jalankan fetch_all.py dulu.');
    return;
  }

  document.getElementById('results').value=results.join(', ');
}

async function initWBData(){
  const st=document.getElementById('dataStatus');
  if(WBData.MARKETS&&WBData.MARKETS.length)buildPasaranDropdown();
  if(!WBData.isFresh()){st.textContent='⏳';await WBData.refresh();st.textContent='';}
  else{st.textContent='✅';setTimeout(()=>{st.textContent='';},2000);}
  if(!_wbDataReady)buildPasaranDropdown();
  onPasaranChange();
  WBData.onUpdate(()=>onPasaranChange());
}
initWBData();
</script>
